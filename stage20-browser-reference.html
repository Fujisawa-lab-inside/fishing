<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stage 20 ブラウザ基準計算器</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    button { font: inherit; padding: .7rem 1rem; }
    dl { display: grid; grid-template-columns: minmax(10rem, auto) 1fr; gap: .5rem 1rem; }
    dt { color: color-mix(in srgb, currentColor 65%, transparent); }
    dd { margin: 0; font-variant-numeric: tabular-nums; }
    #status[data-state="passed"] { color: #16803c; }
    #status[data-state="failed"] { color: #c52b2b; }
  </style>
</head>
<body>
  <h1>Stage 20 ブラウザ基準計算器</h1>
  <p>承認済み50,339セルをWeb Workerへ読み込み、WASM更新核で静水保存を1ステップ確認します。物理流れの計算ではありません。</p>
  <button id="run" type="button">接続試験を実行</button>
  <p id="status" role="status">未実行</p>
  <dl id="result" hidden>
    <dt>メッシュ</dt><dd id="mesh"></dd>
    <dt>WASM</dt><dd id="wasm"></dd>
    <dt>最大流速</dt><dd id="velocity"></dd>
    <dt>最大水深変化</dt><dd id="depth"></dd>
    <dt>計算時間</dt><dd id="time"></dd>
  </dl>
  <script type="module">
    const button = document.querySelector('#run');
    const status = document.querySelector('#status');
    const result = document.querySelector('#result');
    const worker = new Worker('./onga_stage20_reference_worker.mjs', { type: 'module' });
    button.addEventListener('click', () => {
      button.disabled = true;
      status.dataset.state = '';
      status.textContent = '検証中…';
      worker.postMessage({
        type: 'run-still-water-benchmark',
        meshManifestUrl: './public/data/onga/stage20/mesh-v1.json',
        wasmUrl: './public/wasm/stage20-reference-kernel-v1.wasm',
      });
    });
    worker.addEventListener('message', event => {
      const data = event.data;
      button.disabled = false;
      status.dataset.state = data.status;
      status.textContent = data.status === 'passed' ? '合格：ブラウザ計算経路は接続済み' : `失敗：${data.error || '数値誤差が上限超過'}`;
      if (data.status !== 'passed') return;
      result.hidden = false;
      document.querySelector('#mesh').textContent = `${data.counts.cells.toLocaleString()}セル／${data.counts.barrageFaces}堰面`;
      document.querySelector('#wasm').textContent = `${data.wasmBytes.toLocaleString()} bytes`;
      document.querySelector('#velocity').textContent = `${data.maxVelocity.toExponential(3)} m/s`;
      document.querySelector('#depth').textContent = `${data.maxDepthDrift.toExponential(3)} m`;
      document.querySelector('#time').textContent = `${data.timingsMs.total.toFixed(1)} ms（初回読込を含む）`;
    });
  </script>
</body>
</html>
