name: Stage 20 one-time reference s02 continuation
run-name: Stage 20 one-time reference s02 continuation ${{ github.run_id }}

on:
  push:
    branches:
      - codex/stage19-public-inference-inputs
    paths:
      - 'config/stage20_reference_s02_activation_v1.json'

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'
  STAGE20_REVIEWED_COMMIT: ${{ github.event.before }}

concurrency:
  group: stage20-reference-s02-one-time
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate exact reference-s02 one-time control plane before dependencies
        run: python tools/run_stage20_reference_s02_continuation.py --repo-root . --preflight-only

  authorize:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Consume Stage 20 reference-s02 authorization
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          prior_run_ids="$(
            gh api --paginate \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${REPOSITORY}/actions/workflows/stage20-reference-s02-continuation.yml/runs?event=push&branch=${BRANCH}&per_page=100" \
              --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | .id"
          )"
          while IFS= read -r prior_run_id; do
            test -n "$prior_run_id" || continue
            jobs_json="$(
              gh api --paginate --slurp \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "/repos/${REPOSITORY}/actions/runs/${prior_run_id}/jobs?filter=all&per_page=100"
            )"
            if jq -e '[.[].jobs[].steps[]? | select(.name == "Consume Stage 20 reference-s02 authorization" and .conclusion == "success")] | length > 0' <<<"$jobs_json" >/dev/null; then
              echo "Reference-s02 authorization was already consumed by run ${prior_run_id}." >&2
              exit 1
            fi
          done <<<"$prior_run_ids"

  numerical:
    needs: [preflight, authorize]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            tools/requirements-stage16-metric-mesh.txt
            tools/requirements-stage20-kernel-v3.txt
      - name: Install pinned numerical dependencies
        run: |
          python -m pip install -r tools/requirements-stage16-metric-mesh.txt
          python -m pip install -r tools/requirements-stage20-kernel-v3.txt
      - name: Revalidate reference-s02 authorization
        run: python tools/run_stage20_reference_s02_continuation.py --repo-root . --preflight-only
      - name: Run exactly one eight-physical-hour reference-s02 continuation
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-reference-s02
        run: >-
          timeout --signal=TERM --kill-after=30s 5h
          python tools/run_stage20_reference_s02_continuation.py
          --repo-root .
          --output-dir "$WORK_DIR"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ always() }}
        with:
          name: stage20-reference-s02-${{ github.run_id }}
          path: ${{ runner.temp }}/stage20-reference-s02
          if-no-files-found: warn
          retention-days: 90
