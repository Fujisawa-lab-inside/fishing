name: Stage 18 production mesh pilot run
on:
  pull_request:
    paths:
      - 'tools/run_stage18_production_mesh_pilot.py'
      - '.github/workflows/stage18-production-pilot-run.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  staged-pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - name: Generate frozen production mesh
        run: python tools/generate_stage16_metric_mesh.py --repo-root . --output stage18-pilot
      - name: Generate deterministic 64-case ensemble
        run: node onga_stage18_inference_ensemble.mjs config/stage17_inferred_physical_prior_v1.json stage18-pilot/ensemble.json 64 20260713
      - name: Run smoke tier
        run: python tools/run_stage18_production_mesh_pilot.py stage18-pilot/onga_stage16_metric_fv_mesh_v1.npz stage18-pilot/ensemble.json config/stage18_production_mesh_pilot_v1.json smoke --output stage18-pilot/smoke-report.json
      - name: Evaluate smoke tier
        run: node --input-type=module -e "import fs from 'node:fs';import {evaluatePilotResult} from './onga_stage18_pilot_evaluator.mjs';const c=JSON.parse(fs.readFileSync('config/stage18_production_mesh_pilot_v1.json'));const r=JSON.parse(fs.readFileSync('stage18-pilot/smoke-report.json'));const e=evaluatePilotResult(c,r);fs.writeFileSync('stage18-pilot/smoke-evaluation.json',JSON.stringify(e,null,2));if(!e.passed)process.exit(1)"
      - name: Run screening tier
        run: python tools/run_stage18_production_mesh_pilot.py stage18-pilot/onga_stage16_metric_fv_mesh_v1.npz stage18-pilot/ensemble.json config/stage18_production_mesh_pilot_v1.json screening --output stage18-pilot/screening-report.json
      - name: Evaluate screening tier
        run: node --input-type=module -e "import fs from 'node:fs';import {evaluatePilotResult} from './onga_stage18_pilot_evaluator.mjs';const c=JSON.parse(fs.readFileSync('config/stage18_production_mesh_pilot_v1.json'));const r=JSON.parse(fs.readFileSync('stage18-pilot/screening-report.json'));const e=evaluatePilotResult(c,r);fs.writeFileSync('stage18-pilot/screening-evaluation.json',JSON.stringify(e,null,2));if(!e.passed)process.exit(1)"
      - name: Run 16-case pilot tier
        run: python tools/run_stage18_production_mesh_pilot.py stage18-pilot/onga_stage16_metric_fv_mesh_v1.npz stage18-pilot/ensemble.json config/stage18_production_mesh_pilot_v1.json pilot --output stage18-pilot/pilot-report.json
      - name: Evaluate 16-case pilot tier
        run: node --input-type=module -e "import fs from 'node:fs';import {evaluatePilotResult} from './onga_stage18_pilot_evaluator.mjs';const c=JSON.parse(fs.readFileSync('config/stage18_production_mesh_pilot_v1.json'));const r=JSON.parse(fs.readFileSync('stage18-pilot/pilot-report.json'));const e=evaluatePilotResult(c,r);fs.writeFileSync('stage18-pilot/pilot-evaluation.json',JSON.stringify(e,null,2));if(!e.passed)process.exit(1)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage18-production-pilot-results
          path: stage18-pilot/*.json
          if-no-files-found: error
