name: Stage 17 acquisition decision validation

on:
  pull_request:
    paths:
      - 'config/stage17_physical_data_acquisition_decision_record_v1.json'
      - 'tools/validate_stage17_acquisition_decision.mjs'
      - 'docs/STAGE17_ACQUISITION_ROUTE_A.md'
      - '.github/workflows/stage17-acquisition-decision-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'config/stage17_physical_data_acquisition_decision_record_v1.json'
      - 'tools/validate_stage17_acquisition_decision.mjs'
      - 'docs/STAGE17_ACQUISITION_ROUTE_A.md'
      - '.github/workflows/stage17-acquisition-decision-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-acquisition-decision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax-check validator
        run: node --check tools/validate_stage17_acquisition_decision.mjs
      - name: Validate approved route A and safeguards
        run: |
          node tools/validate_stage17_acquisition_decision.mjs \
            config/stage17_physical_data_acquisition_decision_record_v1.json \
            stage17-acquisition-decision-validation.json
      - name: Upload decision evidence
        uses: actions/upload-artifact@v4
        with:
          name: stage17-acquisition-decision-validation
          path: stage17-acquisition-decision-validation.json
