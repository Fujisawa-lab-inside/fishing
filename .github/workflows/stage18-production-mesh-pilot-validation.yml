name: Stage 18 production-mesh pilot validation

on:
  pull_request:
    paths:
      - 'config/stage18_production_mesh_pilot_v1.json'
      - 'tools/validate_stage18_production_mesh_pilot.mjs'
      - 'docs/STAGE18_PRODUCTION_MESH_PILOT.md'
      - '.github/workflows/stage18-production-mesh-pilot-validation.yml'
  push:
    branches: [main]
    paths:
      - 'config/stage18_production_mesh_pilot_v1.json'
      - 'tools/validate_stage18_production_mesh_pilot.mjs'
      - 'docs/STAGE18_PRODUCTION_MESH_PILOT.md'
      - '.github/workflows/stage18-production-mesh-pilot-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-pilot-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax check
        run: node --check tools/validate_stage18_production_mesh_pilot.mjs
      - name: Validate fail-closed pilot contract
        run: node tools/validate_stage18_production_mesh_pilot.mjs
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: stage18-production-mesh-pilot-validation
          path: stage18-production-mesh-pilot-validation.json
