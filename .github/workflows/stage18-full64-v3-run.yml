name: Stage 18 corrected v3 one-time full64 recovery run
run-name: Stage 18 corrected v3 recovery run ${{ github.run_id }}

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Exact confirmation phrase for the one authorized corrected-v3 64-case recovery run'
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'

concurrency:
  group: stage18-full64-v3-one-time-recovery
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      authorization-id: ${{ steps.authorization.outputs.id }}
    steps:
      - name: Validate dispatch identity and recovery scope
        env:
          ACTOR: ${{ github.actor }}
          CONFIRMATION: ${{ inputs.confirmation }}
          REF: ${{ github.ref }}
          REPOSITORY: ${{ github.repository }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = 'RUN_STAGE18_FULL64_V3_RECOVERY_ONCE'
          test "$REPOSITORY" = 'Fujisawa-lab-inside/fishing'
          test "$ACTOR" = 'RyusukeFujisawa'
          test "$REF" = 'refs/heads/main'
          test "$RUN_ATTEMPT" = '1'
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate active v3 authorization and immutable recovery contract
        run: >-
          python tools/validate_stage18_full64_v3_control.py
          --repo-root .
          --expect active
      - name: Record authorization identity
        id: authorization
        run: |
          set -euo pipefail
          authorization_id="$(jq -er '.authorizationId' config/stage18_full64_run_authorization_v3.json)"
          test -n "$authorization_id"
          echo "id=$authorization_id" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - name: Validate result packaging with non-run fixtures
        run: python tools/validate_stage18_full64_v2_evaluator.py --require-numeric-fixture
      - name: Generate exact corrected-v2 mesh and ensemble
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: |
          set -euo pipefail
          test ! -e "$WORK_DIR"
          python tools/generate_stage16_metric_mesh.py \
            --repo-root . \
            --output "$WORK_DIR" \
            --water-manifest data/onga_unified_water_manifest_r3.json \
            --constraints data/onga_stage16_mesh_constraints_v2.json
          node onga_stage18_inference_ensemble_v2.mjs \
            config/stage17_inferred_physical_prior_v1.json \
            "$WORK_DIR/ensemble-v2.json"
      - name: Prove exact map raster coverage without numerical cases
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: |
          set -euo pipefail
          python tools/validate_stage18_full64_v3_map_raster.py \
            "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz" \
            --output "$WORK_DIR/full64-map-raster-preflight.json" \
            > "$WORK_DIR/full64-map-raster-preflight.stdout.json"
          jq -e '
            .status == "passed"
            and .numericalCasesStarted == 0
            and .cellCount == 50129
            and .representedCellCount == 50129
            and .coverageFraction == 1
            and .minimumPixelsPerCell >= 1
            and .cell320PixelCount >= 1
            and .squarePixels == true
            and .pngWidth == 3840
            and .pngHeight == 2640
          ' "$WORK_DIR/full64-map-raster-preflight.json"
      - name: Validate all inputs without starting a numerical case
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: |
          set -euo pipefail
          python tools/preflight_stage18_full64_v3.py \
            "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz" \
            "$WORK_DIR/ensemble-v2.json" \
            config/stage18_full64_run_authorization_v3.json \
            --mesh-summary "$WORK_DIR/stage16_metric_mesh_summary.json" \
            --fields-output "$WORK_DIR/full64-fields.npz" \
            --report-output "$WORK_DIR/full64-report.json" \
            --progress-output "$WORK_DIR/full64-progress.json" \
            --repo-root . \
            > "$WORK_DIR/preflight.json"
          jq -e '.status == "passed" and .numericalCasesStarted == 0 and .outputsCreated == 0' \
            "$WORK_DIR/preflight.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stage18-full64-v3-preflight-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage18-full64-v3/onga_stage16_metric_fv_mesh_v2.npz
            ${{ runner.temp }}/stage18-full64-v3/stage16_metric_mesh_summary.json
            ${{ runner.temp }}/stage18-full64-v3/ensemble-v2.json
            ${{ runner.temp }}/stage18-full64-v3/full64-map-raster-preflight.json
            ${{ runner.temp }}/stage18-full64-v3/preflight.json
          if-no-files-found: error
          retention-days: 7

  authorize:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Revalidate dispatch before v3 consumption
        env:
          ACTOR: ${{ github.actor }}
          AUTHORIZATION_ID: ${{ needs.preflight.outputs.authorization-id }}
          CONFIRMATION: ${{ inputs.confirmation }}
          REF: ${{ github.ref }}
          REPOSITORY: ${{ github.repository }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = 'RUN_STAGE18_FULL64_V3_RECOVERY_ONCE'
          test "$REPOSITORY" = 'Fujisawa-lab-inside/fishing'
          test "$ACTOR" = 'RyusukeFujisawa'
          test "$REF" = 'refs/heads/main'
          test "$RUN_ATTEMPT" = '1'
          test -n "$AUTHORIZATION_ID"
      - name: Consume v3 one-time recovery authorization
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          prior_run_ids="$(
            gh api --paginate \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${REPOSITORY}/actions/workflows/stage18-full64-v3-run.yml/runs?event=workflow_dispatch&per_page=100" \
              --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | .id"
          )"
          while IFS= read -r prior_run_id; do
            test -n "$prior_run_id" || continue
            jobs_json="$(
              gh api --paginate --slurp \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "/repos/${REPOSITORY}/actions/runs/${prior_run_id}/jobs?filter=all&per_page=100"
            )"
            if jq -e '[.[].jobs[].steps[]? | select(.name == "Consume v3 one-time recovery authorization" and .conclusion == "success")] | length > 0' \
              <<<"$jobs_json" >/dev/null; then
              echo "The corrected-v3 one-time recovery path was already consumed by run ${prior_run_id}." >&2
              echo 'A new reviewed execution path and new explicit authorization are required.' >&2
              exit 1
            fi
          done <<<"$prior_run_ids"

  numerical:
    needs: [preflight, authorize]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Reject numerical rerun attempts
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test "$RUN_ATTEMPT" = '1'
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: stage18-full64-v3-preflight-${{ github.run_id }}
          path: ${{ runner.temp }}/stage18-full64-v3
      - name: Revalidate downloaded raster and input preflights
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: |
          set -euo pipefail
          python tools/validate_stage18_full64_v3_map_raster.py \
            "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz" \
            --output "$WORK_DIR/full64-map-raster-preflight-recheck.json" \
            > "$WORK_DIR/full64-map-raster-preflight-recheck.stdout.json"
          cmp "$WORK_DIR/full64-map-raster-preflight.json" \
            "$WORK_DIR/full64-map-raster-preflight-recheck.json"
          python tools/preflight_stage18_full64_v3.py \
            "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz" \
            "$WORK_DIR/ensemble-v2.json" \
            config/stage18_full64_run_authorization_v3.json \
            --mesh-summary "$WORK_DIR/stage16_metric_mesh_summary.json" \
            --fields-output "$WORK_DIR/full64-fields.npz" \
            --report-output "$WORK_DIR/full64-report.json" \
            --progress-output "$WORK_DIR/full64-progress.json" \
            --repo-root . \
            > "$WORK_DIR/preflight-recheck.json"
          cmp "$WORK_DIR/preflight.json" "$WORK_DIR/preflight-recheck.json"
      - name: Create consumed-authorization receipt
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: |
          set -euo pipefail
          python tools/create_stage18_full64_v3_execution_receipt.py \
            "$WORK_DIR/preflight-recheck.json" \
            --contract config/stage18_full64_execution_contract_v3.json \
            --authorization config/stage18_full64_run_authorization_v3.json \
            --gate config/stage18_full64_execution_gate_v3.json \
            --repo-root . \
            --output "$WORK_DIR/execution-receipt.json"
      - name: Run exactly 64 corrected-v2 numerical cases once
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: >-
          timeout --signal=TERM --kill-after=30s 65m
          python tools/run_stage18_full64_v3.py
          "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz"
          "$WORK_DIR/ensemble-v2.json"
          config/stage18_full64_run_authorization_v3.json
          --mesh-summary "$WORK_DIR/stage16_metric_mesh_summary.json"
          --fields-output "$WORK_DIR/full64-fields.npz"
          --report-output "$WORK_DIR/full64-report.json"
          --progress-output "$WORK_DIR/full64-progress.json"
          --repo-root .
      - name: Evaluate provenance and numerical acceptance
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: >-
          python tools/evaluate_stage18_full64_v3.py
          config/stage18_full64_execution_contract_v3.json
          config/stage18_full64_run_authorization_v3.json
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-fields.npz"
          "$WORK_DIR/full64-evaluation.json"
      - name: Seal complete numerical evidence before any map rendering
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: >-
          python tools/seal_stage18_full64_v3_numeric_evidence.py
          "$WORK_DIR"
          --output "$WORK_DIR/full64-numeric-evidence-manifest.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stage18-full64-v3-numeric-evidence-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage18-full64-v3/execution-receipt.json
            ${{ runner.temp }}/stage18-full64-v3/onga_stage16_metric_fv_mesh_v2.npz
            ${{ runner.temp }}/stage18-full64-v3/stage16_metric_mesh_summary.json
            ${{ runner.temp }}/stage18-full64-v3/ensemble-v2.json
            ${{ runner.temp }}/stage18-full64-v3/full64-map-raster-preflight.json
            ${{ runner.temp }}/stage18-full64-v3/full64-map-raster-preflight-recheck.json
            ${{ runner.temp }}/stage18-full64-v3/preflight.json
            ${{ runner.temp }}/stage18-full64-v3/preflight-recheck.json
            ${{ runner.temp }}/stage18-full64-v3/full64-progress.json
            ${{ runner.temp }}/stage18-full64-v3/full64-report.json
            ${{ runner.temp }}/stage18-full64-v3/full64-fields.npz
            ${{ runner.temp }}/stage18-full64-v3/full64-evaluation.json
            ${{ runner.temp }}/stage18-full64-v3/full64-numeric-evidence-manifest.json
          if-no-files-found: error
          retention-days: 90
      - name: Attempt fail-closed STOP image
        if: ${{ failure() || cancelled() }}
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: >-
          python tools/render_stage18_full64_decision_v3.py
          config/stage18_full64_execution_contract_v3.json
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-evaluation.json"
          --map-dir "$WORK_DIR/visual"
          --progress "$WORK_DIR/full64-progress.json"
          --output "$WORK_DIR/full64-diagnostic-stop.svg"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ failure() || cancelled() }}
        with:
          name: stage18-full64-v3-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage18-full64-v3/execution-receipt.json
            ${{ runner.temp }}/stage18-full64-v3/onga_stage16_metric_fv_mesh_v2.npz
            ${{ runner.temp }}/stage18-full64-v3/stage16_metric_mesh_summary.json
            ${{ runner.temp }}/stage18-full64-v3/ensemble-v2.json
            ${{ runner.temp }}/stage18-full64-v3/full64-map-raster-preflight.json
            ${{ runner.temp }}/stage18-full64-v3/full64-map-raster-preflight-recheck.json
            ${{ runner.temp }}/stage18-full64-v3/preflight.json
            ${{ runner.temp }}/stage18-full64-v3/preflight-recheck.json
            ${{ runner.temp }}/stage18-full64-v3/full64-progress.json
            ${{ runner.temp }}/stage18-full64-v3/full64-report.json
            ${{ runner.temp }}/stage18-full64-v3/full64-fields.npz
            ${{ runner.temp }}/stage18-full64-v3/full64-evaluation.json
            ${{ runner.temp }}/stage18-full64-v3/full64-numeric-evidence-manifest.json
            ${{ runner.temp }}/stage18-full64-v3/full64-diagnostic-stop.svg
          if-no-files-found: warn
          retention-days: 90

  maps:
    needs: numerical
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: stage18-full64-v3-numeric-evidence-${{ github.run_id }}
          path: ${{ runner.temp }}/stage18-full64-v3
      - name: Verify downloaded sealed numerical evidence
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: >-
          python tools/seal_stage18_full64_v3_numeric_evidence.py
          --verify "$WORK_DIR/full64-numeric-evidence-manifest.json"
          --workdir "$WORK_DIR"
      - name: Aggregate statistics and render five bound maps
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: >-
          python tools/aggregate_stage18_full64_v3.py
          "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz"
          "$WORK_DIR/full64-fields.npz"
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-evaluation.json"
          config/stage18_full64_run_authorization_v3.json
          config/stage18_full64_execution_contract_v3.json
          --output-dir "$WORK_DIR/visual"
      - name: Render user judgment image
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: >-
          python tools/render_stage18_full64_decision_v3.py
          config/stage18_full64_execution_contract_v3.json
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-evaluation.json"
          --map-dir "$WORK_DIR/visual"
          --manifest "$WORK_DIR/visual/full64-visual-manifest.json"
          --progress "$WORK_DIR/full64-progress.json"
          --output "$WORK_DIR/full64-judgment.svg"
      - name: Verify complete map package
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: |
          set -euo pipefail
          test -s "$WORK_DIR/full64-numeric-evidence-manifest.json"
          test -s "$WORK_DIR/visual/full64-statistics.npz"
          test -s "$WORK_DIR/visual/full64-statistics-summary.json"
          test -s "$WORK_DIR/visual/full64-depth-median.png"
          test -s "$WORK_DIR/visual/full64-velocity-median.png"
          test -s "$WORK_DIR/visual/full64-wet-probability.png"
          test -s "$WORK_DIR/visual/full64-direction-agreement.png"
          test -s "$WORK_DIR/visual/full64-direction-support.png"
          test -s "$WORK_DIR/visual/full64-visual-manifest.json"
          test -s "$WORK_DIR/full64-judgment.svg"
          grep -F '判定: PASS / RESULT: PASS' "$WORK_DIR/full64-judgment.svg"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stage18-full64-v3-results-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage18-full64-v3/full64-numeric-evidence-manifest.json
            ${{ runner.temp }}/stage18-full64-v3/visual
            ${{ runner.temp }}/stage18-full64-v3/full64-judgment.svg
          if-no-files-found: error
          retention-days: 90
      - name: Attempt fail-closed STOP image
        if: ${{ failure() || cancelled() }}
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v3
        run: >-
          python tools/render_stage18_full64_decision_v3.py
          config/stage18_full64_execution_contract_v3.json
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-evaluation.json"
          --map-dir "$WORK_DIR/visual"
          --progress "$WORK_DIR/full64-progress.json"
          --output "$WORK_DIR/full64-diagnostic-stop.svg"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ failure() || cancelled() }}
        with:
          name: stage18-full64-v3-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage18-full64-v3/full64-numeric-evidence-manifest.json
            ${{ runner.temp }}/stage18-full64-v3/visual/full64-statistics-summary.json
            ${{ runner.temp }}/stage18-full64-v3/visual/full64-visual-manifest.json
            ${{ runner.temp }}/stage18-full64-v3/full64-diagnostic-stop.svg
          if-no-files-found: warn
          retention-days: 90
