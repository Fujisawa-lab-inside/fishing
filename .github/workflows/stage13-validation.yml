name: Stage 13 validation

on:
  pull_request:
    paths:
      - 'data/onga_unified_water_manifest_r2.json'
      - 'data/onga_water_rows_r2_*.json'
      - 'tools/validate_stage13_data.mjs'
      - 'tools/validate_stage13_wrappers.mjs'
      - 'tools/audit_stage13_entrypoints.mjs'
      - 'tools/audit_current_flow_model.mjs'
      - 'tools/validate_stage14_conservative_core.mjs'
      - 'tools/validate_stage14_transient_boundary_core.mjs'
      - 'tools/validate_stage14_matrix_free_solver.mjs'
      - 'tools/validate_stage14_implicit_integrator.mjs'
      - 'tools/validate_stage14_physical_input_adapter.mjs'
      - 'tools/validate_stage15_shallow_water_flux_core.mjs'
      - 'tools/validate_stage15_well_balanced_sources.mjs'
      - 'tools/validate_stage15_positivity_limiter.mjs'
      - 'tools/smoke_stage13_browser.mjs'
      - 'tools/smoke_stage13_public.mjs'
      - 'docs/CURRENT_FLOW_MODEL_AUDIT.md'
      - 'docs/STAGE14_TRANSIENT_BOUNDARY_VERIFICATION.md'
      - 'docs/STAGE14_MATRIX_FREE_PCG_VERIFICATION.md'
      - 'docs/STAGE14_IMPLICIT_INTEGRATION_VERIFICATION.md'
      - 'docs/STAGE14_PHYSICAL_INPUT_ADAPTER_VERIFICATION.md'
      - 'docs/STAGE15_SHALLOW_WATER_FLUX_VERIFICATION.md'
      - 'docs/STAGE15_WELL_BALANCED_SOURCE_VERIFICATION.md'
      - 'docs/STAGE15_POSITIVITY_SSPRK2_VERIFICATION.md'
      - 'closed_gate_patch.js'
      - 'pc_full.html'
      - 'mobile_lite.html'
      - 'onga_stage13_*.js'
      - 'onga_stage14_*.mjs'
      - 'onga_stage15_*.mjs'
      - 'config/onga_*_v1.json'
      - 'OngaEstuarySimulator_Browser_Service_v4_6_PCFull_ConfluenceTracer.html'
      - 'OngaEstuarySimulator_Browser_Service_v4_6_MobileLite_ConfluenceTracer.html'
      - '.github/workflows/stage13-validation.yml'
      - '.github/workflows/stage13-public-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'data/onga_unified_water_manifest_r2.json'
      - 'data/onga_water_rows_r2_*.json'
      - 'tools/validate_stage13_data.mjs'
      - 'tools/validate_stage13_wrappers.mjs'
      - 'tools/audit_stage13_entrypoints.mjs'
      - 'tools/audit_current_flow_model.mjs'
      - 'tools/validate_stage14_conservative_core.mjs'
      - 'tools/validate_stage14_transient_boundary_core.mjs'
      - 'tools/validate_stage14_matrix_free_solver.mjs'
      - 'tools/validate_stage14_implicit_integrator.mjs'
      - 'tools/validate_stage14_physical_input_adapter.mjs'
      - 'tools/validate_stage15_shallow_water_flux_core.mjs'
      - 'tools/validate_stage15_well_balanced_sources.mjs'
      - 'tools/validate_stage15_positivity_limiter.mjs'
      - 'tools/smoke_stage13_browser.mjs'
      - 'tools/smoke_stage13_public.mjs'
      - 'docs/CURRENT_FLOW_MODEL_AUDIT.md'
      - 'docs/STAGE14_TRANSIENT_BOUNDARY_VERIFICATION.md'
      - 'docs/STAGE14_MATRIX_FREE_PCG_VERIFICATION.md'
      - 'docs/STAGE14_IMPLICIT_INTEGRATION_VERIFICATION.md'
      - 'docs/STAGE14_PHYSICAL_INPUT_ADAPTER_VERIFICATION.md'
      - 'docs/STAGE15_SHALLOW_WATER_FLUX_VERIFICATION.md'
      - 'docs/STAGE15_WELL_BALANCED_SOURCE_VERIFICATION.md'
      - 'docs/STAGE15_POSITIVITY_SSPRK2_VERIFICATION.md'
      - 'closed_gate_patch.js'
      - 'pc_full.html'
      - 'mobile_lite.html'
      - 'onga_stage13_*.js'
      - 'onga_stage14_*.mjs'
      - 'onga_stage15_*.mjs'
      - 'config/onga_*_v1.json'
      - 'OngaEstuarySimulator_Browser_Service_v4_6_PCFull_ConfluenceTracer.html'
      - 'OngaEstuarySimulator_Browser_Service_v4_6_MobileLite_ConfluenceTracer.html'
      - '.github/workflows/stage13-validation.yml'
      - '.github/workflows/stage13-public-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-authoritative-domain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate authoritative water domain
        run: node tools/validate_stage13_data.mjs data/onga_unified_water_manifest_r2.json
      - name: Syntax-check Stage 13 and isolated solver scripts
        run: |
          node --check onga_stage13_runtime.js
          node --check onga_stage13_bridge.js
          node --check onga_stage13_heatmap_clip.js
          node --check onga_stage13_fluid_domain_patch.js
          node --check onga_stage13_bootstrap.js
          node --check onga_stage14_conservative_flux_core.mjs
          node --check onga_stage14_transient_boundary_core.mjs
          node --check onga_stage14_matrix_free_solver.mjs
          node --check onga_stage14_implicit_integrator.mjs
          node --check onga_stage14_physical_input_adapter.mjs
          node --check onga_stage15_shallow_water_flux_core.mjs
          node --check onga_stage15_well_balanced_sources.mjs
          node --check onga_stage15_positivity_limiter.mjs
          node --check tools/audit_current_flow_model.mjs
          node --check tools/validate_stage14_conservative_core.mjs
          node --check tools/validate_stage14_transient_boundary_core.mjs
          node --check tools/validate_stage14_matrix_free_solver.mjs
          node --check tools/validate_stage14_implicit_integrator.mjs
          node --check tools/validate_stage14_physical_input_adapter.mjs
          node --check tools/validate_stage15_shallow_water_flux_core.mjs
          node --check tools/validate_stage15_well_balanced_sources.mjs
          node --check tools/validate_stage15_positivity_limiter.mjs
          node --check tools/smoke_stage13_browser.mjs
          node --check tools/smoke_stage13_public.mjs
      - name: Validate opt-in wrapper fallback
        run: node tools/validate_stage13_wrappers.mjs
      - name: Audit legacy heatmap and fluid entrypoints
        run: node tools/audit_stage13_entrypoints.mjs stage13-entrypoint-audit.json
      - name: Audit current flow calculation without modifying it
        run: node tools/audit_current_flow_model.mjs current-flow-model-audit.json
      - name: Validate isolated conservative flux algebra
        run: node tools/validate_stage14_conservative_core.mjs stage14-conservative-core-validation.json
      - name: Validate isolated transient and boundary algebra
        run: node tools/validate_stage14_transient_boundary_core.mjs stage14-transient-boundary-validation.json
      - name: Validate isolated matrix-free PCG solver
        run: node tools/validate_stage14_matrix_free_solver.mjs stage14-pcg-validation.json
      - name: Validate isolated implicit integration
        run: node tools/validate_stage14_implicit_integrator.mjs stage14-implicit-validation.json
      - name: Validate isolated physical-input adapter
        run: node tools/validate_stage14_physical_input_adapter.mjs stage14-input-adapter-validation.json
      - name: Validate isolated shallow-water flux
        run: node tools/validate_stage15_shallow_water_flux_core.mjs stage15-swe-flux-validation.json
      - name: Validate well-balanced bathymetry and friction
        run: node tools/validate_stage15_well_balanced_sources.mjs stage15-well-balanced-validation.json
      - name: Validate positivity limiter and SSP-RK2
        run: node tools/validate_stage15_positivity_limiter.mjs stage15-positivity-validation.json
      - name: Upload static audits
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage13-stage15-static-audits
          path: |
            stage13-entrypoint-audit.json
            current-flow-model-audit.json
            stage14-conservative-core-validation.json
            stage14-transient-boundary-validation.json
            stage14-pcg-validation.json
            stage14-implicit-validation.json
            stage14-input-adapter-validation.json
            stage15-swe-flux-validation.json
            stage15-well-balanced-validation.json
            stage15-positivity-validation.json
      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Run PC and mobile browser smoke tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: node tools/smoke_stage13_browser.mjs
      - name: Upload browser smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage13-browser-smoke
          path: stage13-browser-smoke
          if-no-files-found: warn
