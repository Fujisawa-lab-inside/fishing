name: Stage 16 physical readiness validation

on:
  pull_request:
    paths:
      - 'config/onga_stage16_physical_readiness_v1.json'
      - 'config/onga_stage16_physical_readiness_v2.json'
      - 'data/onga_unified_water_manifest_r3.json'
      - 'data/onga_stage16_mesh_constraints_v2.json'
      - 'data/onga_water_rows_r3_*.json'
      - 'config/stage16_governing_equation_decision_inputs.json'
      - 'config/stage16_governing_equation_decision_record_v1.json'
      - 'onga_stage16_physical_readiness.mjs'
      - 'onga_stage16_physical_validation_gate.mjs'
      - 'onga_stage16_governing_equation_decision.mjs'
      - 'tools/validate_stage16_physical_readiness.mjs'
      - 'tools/validate_stage16_physical_validation_gate.mjs'
      - 'docs/STAGE16_PHYSICAL_READINESS.md'
      - '.github/workflows/stage16-physical-readiness-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'config/onga_stage16_physical_readiness_v1.json'
      - 'config/onga_stage16_physical_readiness_v2.json'
      - 'data/onga_unified_water_manifest_r3.json'
      - 'data/onga_stage16_mesh_constraints_v2.json'
      - 'data/onga_water_rows_r3_*.json'
      - 'config/stage16_governing_equation_decision_inputs.json'
      - 'config/stage16_governing_equation_decision_record_v1.json'
      - 'onga_stage16_physical_readiness.mjs'
      - 'onga_stage16_physical_validation_gate.mjs'
      - 'onga_stage16_governing_equation_decision.mjs'
      - 'tools/validate_stage16_physical_readiness.mjs'
      - 'tools/validate_stage16_physical_validation_gate.mjs'
      - 'docs/STAGE16_PHYSICAL_READINESS.md'
      - '.github/workflows/stage16-physical-readiness-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-readiness-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax-check readiness and combined-gate modules
        run: |
          node --check onga_stage16_physical_readiness.mjs
          node --check onga_stage16_physical_validation_gate.mjs
          node --check tools/validate_stage16_physical_readiness.mjs
          node --check tools/validate_stage16_physical_validation_gate.mjs
      - name: Verify physical-input blocking and explicit approval contract
        run: |
          node tools/validate_stage16_physical_readiness.mjs \
            config/onga_stage16_physical_readiness_v2.json \
            stage16-physical-readiness-validation.json
      - name: Verify the combined governing-equation and physical-input gate
        run: node tools/validate_stage16_physical_validation_gate.mjs stage16-physical-validation-gate-validation.json
      - name: Upload readiness reports
        uses: actions/upload-artifact@v4
        with:
          name: stage16-physical-readiness-validation
          path: |
            stage16-physical-readiness-validation.json
            stage16-physical-validation-gate-validation.json
            config/onga_stage16_physical_readiness_v2.json
            config/stage16_governing_equation_decision_record_v1.json
