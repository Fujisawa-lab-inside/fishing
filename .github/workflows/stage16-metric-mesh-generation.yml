name: Stage 16 metric mesh generation

on:
  push:
    branches:
      - feat/stage16-metric-fv-mesh-package
    paths:
      - 'data/onga_stage16_mesh_source_v1.json'
      - 'tools/generate_stage16_metric_fv_mesh.py.gz.b64'
      - '.github/workflows/stage16-metric-mesh-generation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'data/onga_stage16_mesh_source_v1.json'
      - 'tools/generate_stage16_metric_fv_mesh.py.gz.b64'
      - 'onga_stage16_metric_fv_mesh_loader.mjs'
      - 'tools/validate_stage16_metric_fv_mesh.mjs'
      - '.github/workflows/stage16-metric-mesh-generation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pinned deterministic mesh dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            numpy==2.3.5 rasterio==1.5.0 shapely==2.1.2 triangle==20250106
      - name: Decode and authenticate generator
        run: |
          python - <<'PY'
          import base64, gzip, hashlib
          from pathlib import Path
          encoded = Path('tools/generate_stage16_metric_fv_mesh.py.gz.b64').read_text().strip()
          source = gzip.decompress(base64.b64decode(encoded))
          digest = hashlib.sha256(source).hexdigest()
          expected = '251ce3c6e25f63a92b669690159e51cda357ac80beb86a80cc53002b1202a8c3'
          if digest != expected:
              raise SystemExit(f'generator SHA-256 mismatch: {digest}')
          Path('/tmp/generate_stage16_metric_fv_mesh.py').write_bytes(source)
          PY
      - name: Generate exact metric finite-volume mesh package
        run: |
          rm -rf data/stage16
          python /tmp/generate_stage16_metric_fv_mesh.py \
            --water-manifest data/onga_unified_water_manifest_r2.json \
            --source data/onga_stage16_mesh_source_v1.json \
            --output data/stage16
      - name: Validate generated compact package
        run: |
          node --check onga_stage16_metric_fv_mesh_loader.mjs
          node --check tools/validate_stage16_metric_fv_mesh.mjs
          node tools/validate_stage16_metric_fv_mesh.mjs \
            data/stage16/onga_fv_metric_mesh_compact_manifest_v1.json \
            data/onga_stage16_mesh_source_v1.json \
            stage16-metric-mesh-validation.json
      - name: Commit deterministic generated package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/stage16
          if git diff --cached --quiet; then
            echo 'Generated package is already current.'
          else
            git commit -m 'Generate deterministic Stage 16 metric FV mesh package'
            git push origin HEAD:${TARGET_BRANCH}
          fi
      - name: Upload generation validation
        uses: actions/upload-artifact@v4
        with:
          name: stage16-metric-mesh-generation-validation
          path: stage16-metric-mesh-validation.json
