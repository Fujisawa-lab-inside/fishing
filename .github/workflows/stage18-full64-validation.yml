      - 'docs/visuals/stage18-v3-execution-decision.svg'
      - 'docs/WORK_HANDOFF.md'
      - '.github/workflows/stage18-full64-validation.yml'
      - '.github/workflows/stage18-full64-run.yml'
      - '.github/workflows/stage18-full64-v2-run.yml'
      - '.github/workflows/stage18-full64-v3-run.yml'
      - '.github/workflows/stage18-production-pilot-run.yml'
      - '.github/workflows/stage16-metric-mesh-generation.yml'
  push:
    branches: [main]
    paths:
      - 'config/stage18_full64_execution_gate_v1.json'
      - 'config/stage18_full64_run_authorization_v1.json'
      - 'config/stage18_full64_run_authorization_v2.json'
      - 'config/stage18_full64_execution_contract_v2.json'
      - 'config/stage18_full64_run_authorization_v3.json'
      - 'config/stage18_full64_execution_contract_v3.json'
      - 'config/stage18_full64_execution_gate_v3.json'
      - 'config/stage17_inferred_physical_prior_v1.json'
      - 'data/onga_stage16_mesh_constraints_v*.json'
      - 'data/onga_unified_water_manifest_r*.json'
      - 'data/onga_water_rows_r*_*.json'
      - 'onga_stage18_full64_evaluator.mjs'
      - 'onga_stage18_inference_ensemble.mjs'
      - 'onga_stage18_inference_ensemble_v2.mjs'
      - 'tools/evaluate_stage18_full64.mjs'
      - 'tools/generate_stage16_metric_mesh.py'
