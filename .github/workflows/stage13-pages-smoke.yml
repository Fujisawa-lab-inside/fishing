name: Stage 13 public Pages smoke

on:
  pull_request:
    paths:
      - 'tools/smoke_stage13_public_pages.mjs'
      - '.github/workflows/stage13-pages-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-public-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Validate public PC and mobile URLs
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: node tools/smoke_stage13_public_pages.mjs
      - name: Upload public Pages diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage13-public-pages-smoke
          path: stage13-pages-smoke
          if-no-files-found: warn
