<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Stage 20 ハイブリッド計算経路</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    button { font: inherit; padding: .7rem 1rem; }
    dl { display: grid; grid-template-columns: minmax(11rem, auto) 1fr; gap: .5rem 1rem; }
    dt { color: color-mix(in srgb, currentColor 65%, transparent); }
    dd { margin: 0; font-variant-numeric: tabular-nums; }
    #status[data-state="passed"] { color: #16803c; }
    #status[data-state="failed"] { color: #c52b2b; }
  </style>
</head>
<body>
  <h1>Stage 20 ハイブリッド計算経路</h1>
  <p>合成応答パックをWeb Workerへ読み込み、50,339セルについて過去12時間から未来24時間までを1時間間隔で合成します。物理事前計算の結果ではありません。</p>
  <button id="run" type="button">36時間合成試験を実行</button>
  <p id="status" role="status">未実行</p>
  <dl id="result" hidden>
    <dt>出力時点</dt><dd id="snapshots"></dd>
    <dt>セル数</dt><dd id="cells"></dd>
    <dt>応答パック</dt><dd id="pack"></dd>
    <dt>合成出力</dt><dd id="output"></dd>
    <dt>合成時間</dt><dd id="synthesis"></dd>
    <dt>初回読込を含む合計</dt><dd id="total"></dd>
  </dl>
  <script type="module">
    const button = document.querySelector('#run');
    const status = document.querySelector('#status');
    const result = document.querySelector('#result');
    const worker = new Worker('./onga_stage20_hybrid_worker.mjs', { type: 'module' });
    let inputs;
    button.addEventListener('click', async () => {
      button.disabled = true;
      status.dataset.state = '';
      status.textContent = '合成中…';
      inputs ??= await fetch('./public/data/onga/stage20/hybrid-synthetic-input-v1.json').then(response => response.json());
      worker.postMessage({
        type: 'run-hybrid-synthesis',
        responseManifestUrl: './public/data/onga/stage20/response-pack-synthetic-v1.json',
        inputs,
        includeOutput: false,
      });
    });
    worker.addEventListener('message', event => {
      const data = event.data;
      button.disabled = false;
      status.dataset.state = data.status;
      status.textContent = data.status === 'passed' ? '合格：36時間のブラウザ合成経路は接続済み' : `失敗：${data.error || '検証エラー'}`;
      if (data.status !== 'passed') return;
      result.hidden = false;
      document.querySelector('#snapshots').textContent = `${data.snapshotCount}時点（${data.hourRange[0]}〜+${data.hourRange[1]}時間）`;
      document.querySelector('#cells').textContent = data.cellCount.toLocaleString();
      document.querySelector('#pack').textContent = `${(data.responsePackBytes / 1024 / 1024).toFixed(1)} MiB`;
      document.querySelector('#output').textContent = `${(data.outputBytes / 1024 / 1024).toFixed(1)} MiB／SHA-256 ${data.outputSha256.slice(0, 12)}…`;
      document.querySelector('#synthesis').textContent = `${data.timingsMs.synthesis.toFixed(1)} ms`;
      document.querySelector('#total').textContent = `${data.timingsMs.total.toFixed(1)} ms`;
    });
  </script>
</body>
</html>
