      - 'tools/run_stage18_full64_v2.py'
      - 'tools/preflight_stage18_full64_v2.py'
      - 'tools/stage18_shallow_water_kernel_v2.py'
      - 'tools/create_stage18_full64_v2_execution_receipt.py'
