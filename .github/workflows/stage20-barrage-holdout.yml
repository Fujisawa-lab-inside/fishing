      - name: Run barrage-open-s01
        run: timeout --signal=TERM --kill-after=30s 5h python tools/run_stage20_barrage_holdout_segment.py --repo-root . --job-id barrage-open-s01 --output-dir "$RUNNER_TEMP/output"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ always() }}
        with:
          name: barrage-open-s01-${{ github.run_id }}
          path: ${{ runner.temp }}/output
          if-no-files-found: warn
          retention-days: 90

  closed_s02:
