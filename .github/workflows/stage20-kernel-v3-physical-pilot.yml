name: Stage 20 one-time kernel v3 physical pilot
run-name: Stage 20 one-time kernel v3 physical pilot ${{ github.run_id }}

on:
  push:
    branches:
      - codex/stage19-public-inference-inputs
    paths:
      - 'config/stage20_kernel_v3_physical_pilot_activation_v1.json'

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'
  STAGE20_REVIEWED_COMMIT: ${{ github.event.before }}

concurrency:
  group: stage20-kernel-v3-physical-pilot-one-time
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate exact kernel v3 one-time control plane before dependencies
        run: python tools/run_stage20_kernel_v3_physical_pilot.py --repo-root . --preflight-only

  authorize:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Consume Stage 20 kernel v3 physical pilot authorization
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          prior_run_ids="$(
            gh api --paginate \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${REPOSITORY}/actions/workflows/stage20-kernel-v3-physical-pilot.yml/runs?event=push&branch=${BRANCH}&per_page=100" \
              --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | .id"
          )"
          while IFS= read -r prior_run_id; do
            test -n "$prior_run_id" || continue
            jobs_json="$(
              gh api --paginate --slurp \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "/repos/${REPOSITORY}/actions/runs/${prior_run_id}/jobs?filter=all&per_page=100"
            )"
            if jq -e '[.[].jobs[].steps[]? | select(.name == "Consume Stage 20 kernel v3 physical pilot authorization" and .conclusion == "success")] | length > 0' \
              <<<"$jobs_json" >/dev/null; then
              echo "Kernel v3 physical-pilot authorization was already consumed by run ${prior_run_id}." >&2
              exit 1
            fi
          done <<<"$prior_run_ids"

  numerical:
    needs: [preflight, authorize]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            tools/requirements-stage16-metric-mesh.txt
            tools/requirements-stage20-kernel-v3.txt
      - name: Install pinned numerical dependencies
        run: |
          python -m pip install -r tools/requirements-stage16-metric-mesh.txt
          python -m pip install -r tools/requirements-stage20-kernel-v3.txt
          python -m pip install pillow==12.3.0
      - name: Revalidate kernel v3 one-time authorization
        run: python tools/run_stage20_kernel_v3_physical_pilot.py --repo-root . --preflight-only
      - name: Run exactly one 600-second mesh-v2 kernel-v3 physical pilot
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-kernel-v3-physical-pilot
        run: >-
          timeout --signal=TERM --kill-after=30s 20m
          python tools/run_stage20_kernel_v3_physical_pilot.py
          --repo-root .
          --output-dir "$WORK_DIR"
      - name: Render the four approved kernel-v3 views
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-kernel-v3-physical-pilot
        run: >-
          PYTHONPATH=tools python tools/render_stage20_hybrid_physical_pilot_views.py
          "$WORK_DIR/pilot-final-fields.npz"
          --repo-root .
          --mesh-manifest public/data/onga/stage20/mesh-v2.json
          --manifest-schema onga-stage20-kernel-v3-physical-pilot-visual-manifest-v1
          --output-dir "$WORK_DIR/maps"
          --manifest-output "$WORK_DIR/pilot-visual-manifest.json"
      - name: Seal numerical and visual kernel-v3 evidence
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-kernel-v3-physical-pilot
        run: >-
          python tools/seal_stage20_hybrid_physical_pilot_evidence.py
          "$WORK_DIR"
          --expected-cell-count 50199
          --manifest-schema onga-stage20-kernel-v3-physical-pilot-evidence-v1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stage20-kernel-v3-physical-pilot-${{ github.run_id }}
          path: ${{ runner.temp }}/stage20-kernel-v3-physical-pilot
          if-no-files-found: error
          retention-days: 90
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ failure() || cancelled() }}
        with:
          name: stage20-kernel-v3-physical-pilot-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/stage20-kernel-v3-physical-pilot
          if-no-files-found: warn
          retention-days: 30
