name: Stage 18 ensemble statistics validation

on:
  pull_request:
    paths:
      - 'onga_stage18_ensemble_statistics.mjs'
      - 'tools/validate_stage18_ensemble_statistics.mjs'
      - 'docs/STAGE18_ENSEMBLE_STATISTICS.md'
      - '.github/workflows/stage18-ensemble-statistics-validation.yml'
  push:
    branches: [main]
    paths:
      - 'onga_stage18_ensemble_statistics.mjs'
      - 'tools/validate_stage18_ensemble_statistics.mjs'
      - 'docs/STAGE18_ENSEMBLE_STATISTICS.md'
      - '.github/workflows/stage18-ensemble-statistics-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-ensemble-statistics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax check
        run: |
          node --check onga_stage18_ensemble_statistics.mjs
          node --check tools/validate_stage18_ensemble_statistics.mjs
      - name: Validate ensemble statistics and safeguards
        run: node tools/validate_stage18_ensemble_statistics.mjs
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: stage18-ensemble-statistics-validation
          path: stage18-ensemble-statistics-validation.json
