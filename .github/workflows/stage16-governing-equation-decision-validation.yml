name: Stage 16 governing equation decision validation

on:
  pull_request:
    paths:
      - 'onga_stage16_governing_equation_decision.mjs'
      - 'tools/validate_stage16_governing_equation_decision.mjs'
      - 'tools/build_stage16_governing_equation_decision_packet.mjs'
      - 'config/stage16_governing_equation_decision_inputs.json'
      - 'docs/STAGE16_GOVERNING_EQUATION_DECISION.md'
      - '.github/workflows/stage16-governing-equation-decision-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'onga_stage16_governing_equation_decision.mjs'
      - 'tools/validate_stage16_governing_equation_decision.mjs'
      - 'tools/build_stage16_governing_equation_decision_packet.mjs'
      - 'config/stage16_governing_equation_decision_inputs.json'
      - 'docs/STAGE16_GOVERNING_EQUATION_DECISION.md'
      - '.github/workflows/stage16-governing-equation-decision-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-governing-equation-decision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax-check decision modules
        run: |
          node --check onga_stage16_governing_equation_decision.mjs
          node --check tools/validate_stage16_governing_equation_decision.mjs
          node --check tools/build_stage16_governing_equation_decision_packet.mjs
      - name: Validate decision logic
        run: node tools/validate_stage16_governing_equation_decision.mjs stage16-governing-equation-decision-validation.json
      - name: Build current decision packet
        run: node tools/build_stage16_governing_equation_decision_packet.mjs config/stage16_governing_equation_decision_inputs.json stage16-governing-equation-decision-packet.json
      - name: Upload decision evidence
        uses: actions/upload-artifact@v4
        with:
          name: stage16-governing-equation-decision
          path: |
            stage16-governing-equation-decision-validation.json
            stage16-governing-equation-decision-packet.json
