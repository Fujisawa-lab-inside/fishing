name: Stage 20 one-time barrage holdout
run-name: Stage 20 one-time barrage holdout ${{ github.run_id }}

on:
  push:
    branches:
      - codex/stage19-public-inference-inputs
    paths:
      - 'config/stage20_barrage_holdout_activation_v1.json'

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'
  STAGE20_REVIEWED_COMMIT: ${{ github.event.before }}

concurrency:
  group: stage20-barrage-holdout-one-time
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate exact barrage holdout control plane before dependencies
        run: python tools/run_stage20_barrage_holdout_segment.py --repo-root . --preflight-only

  authorize:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Consume Stage 20 barrage holdout authorization
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          prior_run_ids="$(
            gh api --paginate \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${REPOSITORY}/actions/workflows/stage20-barrage-holdout.yml/runs?event=push&branch=${BRANCH}&per_page=100" \
              --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | .id"
          )"
          while IFS= read -r prior_run_id; do
            test -n "$prior_run_id" || continue
            jobs_json="$(
              gh api --paginate --slurp \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "/repos/${REPOSITORY}/actions/runs/${prior_run_id}/jobs?filter=all&per_page=100"
            )"
            if jq -e '[.[].jobs[].steps[]? | select(.name == "Consume Stage 20 barrage holdout authorization" and .conclusion == "success")] | length > 0' <<<"$jobs_json" >/dev/null; then
              echo "Barrage holdout authorization was already consumed by run ${prior_run_id}." >&2
              exit 1
            fi
          done <<<"$prior_run_ids"

  closed_s01:
    needs: [preflight, authorize]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with: {fetch-depth: 0, persist-credentials: false}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            tools/requirements-stage16-metric-mesh.txt
            tools/requirements-stage20-kernel-v3.txt
      - name: Install pinned numerical dependencies
        run: |
          python -m pip install -r tools/requirements-stage16-metric-mesh.txt
          python -m pip install -r tools/requirements-stage20-kernel-v3.txt
      - name: Run barrage-closed-s01
        run: timeout --signal=TERM --kill-after=30s 5h python tools/run_stage20_barrage_holdout_segment.py --repo-root . --job-id barrage-closed-s01 --output-dir "$RUNNER_TEMP/output"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ always() }}
        with:
          name: barrage-closed-s01-${{ github.run_id }}
          path: ${{ runner.temp }}/output
          if-no-files-found: warn
          retention-days: 90

  open_s01:
    needs: [preflight, authorize]
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with: {fetch-depth: 0, persist-credentials: false}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
