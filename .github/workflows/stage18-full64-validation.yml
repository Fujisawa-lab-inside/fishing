      - 'tools/render_stage18_full64_visuals.py'
      - 'tools/render_stage18_full64_diagnostic.py'
      - 'tools/run_stage18_production_mesh_pilot.py'
      - 'tools/requirements-stage16-metric-mesh.txt'
      - 'tools/validate_stage18_full64.mjs'
      - 'tools/validate_stage18_full64_gate.mjs'
      - 'tools/validate_stage18_full64_artifacts.py'
      - 'tools/validate_stage18_full64_workflow.mjs'
      - 'tools/validate_stage18_full64_execution_contract_v2.mjs'
      - 'tools/validate_stage18_full64_v2.py'
      - 'tools/validate_stage18_full64_v2_evaluator.py'
      - 'tools/validate_stage18_full64_v2_map_raster.py'
      - 'tools/validate_stage18_full64_v2_workflow.py'
      - 'tools/stage18_full64_v3_profile.py'
      - 'tools/run_stage18_full64_v3.py'
      - 'tools/preflight_stage18_full64_v3.py'
      - 'tools/create_stage18_full64_v3_execution_receipt.py'
      - 'tools/evaluate_stage18_full64_v3.py'
      - 'tools/aggregate_stage18_full64_v3.py'
      - 'tools/render_stage18_full64_decision_v3.py'
      - 'tools/seal_stage18_full64_v3_numeric_evidence.py'
      - 'tools/validate_stage18_full64_v3_control.py'
      - 'tools/validate_stage18_full64_v3_map_raster.py'
      - 'tools/validate_stage18_full64_v3_workflow.py'
      - 'docs/STAGE18_FULL64_RUN.md'
      - 'docs/STAGE18_FULL64_V2_EXECUTION_PLAN.md'
      - 'docs/STAGE18_FULL64_V3_RECOVERY_PLAN.md'
      - 'docs/visuals/stage18-v2-execution-decision.svg'
      - 'docs/visuals/stage18-v3-execution-decision.svg'
      - 'docs/WORK_HANDOFF.md'
      - '.github/workflows/stage18-full64-validation.yml'
      - '.github/workflows/stage18-full64-run.yml'
      - '.github/workflows/stage18-full64-v2-run.yml'
      - '.github/workflows/stage18-full64-v3-run.yml'
      - '.github/workflows/stage18-production-pilot-run.yml'
      - '.github/workflows/stage16-metric-mesh-generation.yml'

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
      - name: Install pinned mesh and validation dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - name: Syntax checks
        env:
          PYTHONPYCACHEPREFIX: ${{ runner.temp }}/stage18-pycache
        run: |
          node --check onga_stage18_full64_evaluator.mjs
          node --check tools/evaluate_stage18_full64.mjs
          node --check tools/validate_stage18_full64.mjs
          node --check tools/validate_stage18_full64_gate.mjs
          node --check tools/validate_stage18_full64_workflow.mjs
          node --check onga_stage18_inference_ensemble_v2.mjs
          node --check tools/validate_stage18_full64_execution_contract_v2.mjs
          python -m py_compile tools/run_stage18_production_mesh_pilot.py tools/run_stage18_full64.py tools/aggregate_stage18_full64.py tools/render_stage18_full64_visuals.py tools/render_stage18_full64_diagnostic.py tools/validate_stage18_full64_artifacts.py tools/run_stage18_full64_v2.py tools/preflight_stage18_full64_v2.py tools/stage18_shallow_water_kernel_v2.py tools/create_stage18_full64_v2_execution_receipt.py tools/evaluate_stage18_full64_v2.py tools/aggregate_stage18_full64_v2.py tools/render_stage18_full64_decision_v2.py tools/validate_stage18_full64_v2.py tools/validate_stage18_full64_v2_evaluator.py tools/validate_stage18_full64_v2_map_raster.py tools/validate_stage18_full64_v2_workflow.py tools/stage18_full64_v3_profile.py tools/run_stage18_full64_v3.py tools/preflight_stage18_full64_v3.py tools/create_stage18_full64_v3_execution_receipt.py tools/evaluate_stage18_full64_v3.py tools/aggregate_stage18_full64_v3.py tools/render_stage18_full64_decision_v3.py tools/seal_stage18_full64_v3_numeric_evidence.py tools/validate_stage18_full64_v3_control.py tools/validate_stage18_full64_v3_map_raster.py tools/validate_stage18_full64_v3_workflow.py
      - name: Validate pending or active execution gate without numerical execution
        env:
          EXECUTION_GITHUB_RUN_ID: ${{ github.run_id }}
          EXECUTION_GITHUB_SHA: ${{ github.sha }}
          GATE_REPORT: ${{ runner.temp }}/stage18-full64-gate-validation.json
        run: |
          set -euo pipefail
          gate_state="$(jq -er '.state' config/stage18_full64_execution_gate_v1.json)"
          if test "$gate_state" = 'awaiting_new_explicit_authorization'; then
            node tools/validate_stage18_full64_gate.mjs --output "$GATE_REPORT"
          elif test "$gate_state" = 'authorized'; then
            node tools/validate_stage18_full64_gate.mjs --require-active --output "$GATE_REPORT"
            active_test_root="${RUNNER_TEMP}/stage18-active-gate-check"
            test ! -e "$active_test_root"
            mkdir -p "$active_test_root"
            set +e
            env \
              GITHUB_ACTIONS=true \
              GITHUB_ACTOR=RyusukeFujisawa \
              GITHUB_EVENT_NAME=workflow_dispatch \
              GITHUB_REF=refs/heads/main \
              GITHUB_REPOSITORY=Fujisawa-lab-inside/fishing \
              GITHUB_RUN_ATTEMPT=1 \
              GITHUB_RUN_ID="$EXECUTION_GITHUB_RUN_ID" \
              GITHUB_SHA="$EXECUTION_GITHUB_SHA" \
              GITHUB_WORKFLOW='Stage 18 corrected v2 one-time full64 numerical run' \
              GITHUB_WORKFLOW_REF='Fujisawa-lab-inside/fishing/.github/workflows/stage18-full64-v2-run.yml@refs/heads/main' \
              python tools/preflight_stage18_full64_v2.py \
                "$active_test_root/missing-mesh.npz" \
                "$active_test_root/missing-ensemble.json" \
                config/stage18_full64_run_authorization_v2.json \
                --mesh-summary "$active_test_root/missing-summary.json" \
                --fields-output "$active_test_root/must-not-create-fields.npz" \
                --report-output "$active_test_root/must-not-create-report.json" \
                --progress-output "$active_test_root/must-not-create-progress.json" \
                --repo-root . \
                >"$active_test_root/preflight.stdout" \
                2>"$active_test_root/preflight.stderr"
            preflight_status="$?"
            set -e
            test "$preflight_status" -eq 3
            grep -F 'V2 PREFLIGHT STOP:' "$active_test_root/preflight.stderr"
            grep -F 'No numerical cases were started and no outputs were created.' \
              "$active_test_root/preflight.stderr"
            test ! -e "$active_test_root/must-not-create-fields.npz"
            test ! -e "$active_test_root/must-not-create-report.json"
            test ! -e "$active_test_root/must-not-create-progress.json"
          else
            echo "Unsupported Stage 18 execution-gate state: $gate_state" >&2
            exit 1
          fi
          jq -e --arg state "$gate_state" \
            '.status == "passed" and .state == $state and .full64Executed == false' \
            "$GATE_REPORT"
          cp "$GATE_REPORT" stage18-full64-gate-validation.json
      - name: Validate one-time workflow safeguards
        run: node tools/validate_stage18_full64_workflow.mjs
      - name: Validate pending corrected-v2 path without numerical execution
        run: |
          node tools/validate_stage18_full64_execution_contract_v2.mjs \
            stage18-full64-execution-contract-v2-validation.json
          python tools/validate_stage18_full64_v2.py \
            > stage18-full64-v2-negative-validation.json
          python tools/validate_stage18_full64_v2_evaluator.py --require-numeric-fixture \
            > stage18-full64-v2-evaluator-validation.json
          python tools/validate_stage18_full64_v2_workflow.py \
            > stage18-full64-v2-workflow-validation.json
      - name: Validate corrected-v3 recovery control without numerical execution
        env:
          EXECUTION_GITHUB_RUN_ID: ${{ github.run_id }}
          EXECUTION_GITHUB_SHA: ${{ github.sha }}
          V3_CONTROL_REPORT: ${{ runner.temp }}/stage18-full64-v3-control-validation.json
          V3_WORKFLOW_REPORT: ${{ runner.temp }}/stage18-full64-v3-workflow-validation.json
        run: |
          set -euo pipefail
          python tools/validate_stage18_full64_v3_workflow.py \
            > "$V3_WORKFLOW_REPORT"
          v3_state="$(jq -er '.state' config/stage18_full64_execution_gate_v3.json)"
          if test "$v3_state" = 'awaiting_new_explicit_authorization'; then
            test ! -e config/stage18_full64_run_authorization_v3.json
            python tools/validate_stage18_full64_v3_control.py \
              --repo-root . \
              --expect pending \
              --output "$V3_CONTROL_REPORT"
            set +e
            python tools/preflight_stage18_full64_v3.py \
              missing-v3-mesh.npz \
              missing-v3-ensemble.json \
              --mesh-summary missing-v3-summary.json \
              --fields-output stage18-v3-must-not-create-fields.npz \
              --report-output stage18-v3-must-not-create-report.json \
              --progress-output stage18-v3-must-not-create-progress.json \
              --repo-root . \
              > stage18-v3-pending-preflight.stdout \
              2> stage18-v3-pending-preflight.stderr
            preflight_status="$?"
            set -e
            test "$preflight_status" -eq 2
            grep -F 'V3 CONTROL-PLANE STOP:' stage18-v3-pending-preflight.stderr
            grep -F 'No numerical cases were started' stage18-v3-pending-preflight.stderr
            test ! -e stage18-v3-must-not-create-fields.npz
            test ! -e stage18-v3-must-not-create-report.json
            test ! -e stage18-v3-must-not-create-progress.json
            rm -f stage18-v3-pending-preflight.stdout stage18-v3-pending-preflight.stderr
          elif test "$v3_state" = 'authorized'; then
            python tools/validate_stage18_full64_v3_control.py \
              --repo-root . \
              --expect active \
              --output "$V3_CONTROL_REPORT"
            active_test_root="${RUNNER_TEMP}/stage18-v3-active-control-check"
            test ! -e "$active_test_root"
            mkdir -p "$active_test_root"
            git worktree add --detach "$active_test_root/repo" "$EXECUTION_GITHUB_SHA"
            set +e
            env \
              GITHUB_ACTIONS=true \
              GITHUB_ACTOR=RyusukeFujisawa \
              GITHUB_EVENT_NAME=workflow_dispatch \
              GITHUB_REF=refs/heads/main \
              GITHUB_REPOSITORY=Fujisawa-lab-inside/fishing \
              GITHUB_RUN_ATTEMPT=1 \
              GITHUB_RUN_ID="$EXECUTION_GITHUB_RUN_ID" \
              GITHUB_SHA="$EXECUTION_GITHUB_SHA" \
              GITHUB_WORKFLOW='Stage 18 corrected v3 one-time full64 recovery run' \
              GITHUB_WORKFLOW_REF='Fujisawa-lab-inside/fishing/.github/workflows/stage18-full64-v3-run.yml@refs/heads/main' \
              python tools/preflight_stage18_full64_v3.py \
                missing-v3-mesh.npz \
                missing-v3-ensemble.json \
                config/stage18_full64_run_authorization_v3.json \
                --mesh-summary missing-v3-summary.json \
                --fields-output "$active_test_root/must-not-create-fields.npz" \
                --report-output "$active_test_root/must-not-create-report.json" \
                --progress-output "$active_test_root/must-not-create-progress.json" \
                --repo-root "$active_test_root/repo" \
                > "$active_test_root/preflight.stdout" \
                2> "$active_test_root/preflight.stderr"
            active_preflight_status="$?"
            set -e
            test "$active_preflight_status" -eq 3
            grep -F 'V3 PREFLIGHT STOP:' "$active_test_root/preflight.stderr"
            grep -F 'No numerical cases were started and no outputs were created.' \
              "$active_test_root/preflight.stderr"
            test ! -e "$active_test_root/must-not-create-fields.npz"
            test ! -e "$active_test_root/must-not-create-report.json"
            test ! -e "$active_test_root/must-not-create-progress.json"
          else
            echo "Unsupported Stage 18 v3 execution-gate state: $v3_state" >&2
            exit 1
          fi
          cp "$V3_CONTROL_REPORT" stage18-full64-v3-control-validation.json
          cp "$V3_WORKFLOW_REPORT" stage18-full64-v3-workflow-validation.json
      - name: Verify retired numerical CLIs reject before creating outputs
        run: |
          set -euo pipefail
          if python tools/run_stage18_full64.py \
            missing-retired-mesh.npz \
            missing-retired-ensemble.json \
            config/stage18_full64_run_authorization_v1.json \
            --mesh-summary missing-retired-summary.json \
            --fields-output stage18-retired-fields.npz \
            --report-output stage18-retired-report.json \
            --progress-output stage18-retired-progress.json \
            --repo-root . \
            >stage18-retired-runner.log 2>&1; then
            echo 'Retired v1 full64 runner unexpectedly succeeded.' >&2
            exit 1
          fi
          grep -F 'The v1 full64 runner is retired after the Ashiya bridge geometry correction; no numerical cases were started.' stage18-retired-runner.log
          test ! -e stage18-retired-fields.npz
          test ! -e stage18-retired-report.json
          test ! -e stage18-retired-progress.json
          rm -f stage18-retired-runner.log
          if python tools/run_stage18_production_mesh_pilot.py \
            missing-retired-mesh.npz \
            missing-retired-ensemble.json \
            config/stage18_production_mesh_pilot_v1.json \
            pilot \
            --output stage18-retired-pilot.json \
            >stage18-retired-pilot.log 2>&1; then
            echo 'Retired v1 pilot runner unexpectedly succeeded.' >&2
            exit 1
          fi
          grep -F 'The v1 production-mesh pilot runner is retired after the Ashiya bridge geometry correction; no numerical cases were started.' stage18-retired-pilot.log
          test ! -e stage18-retired-pilot.json
          rm -f stage18-retired-pilot.log
      - name: Regenerate candidate mesh and reject the retired authorization
        run: |
          python tools/generate_stage16_metric_mesh.py \
            --repo-root . \
            --output stage18-contract-mesh \
            --water-manifest data/onga_unified_water_manifest_r3.json \
            --constraints data/onga_stage16_mesh_constraints_v2.json \
            --probe
          python tools/validate_stage18_full64_v2_map_raster.py \
            stage18-contract-mesh/onga_stage16_metric_fv_mesh_v2.npz \
            --output stage18-full64-v2-map-raster-validation.json
          jq -e \
            '.status == "passed" and .numericalCasesStarted == 0 and
             .representedCellCount == 50129 and .coverageFraction == 1 and
             .minimumPixelsPerCell >= 1 and .cell320PixelCount >= 1 and
             .pngWidth == 3840 and .pngHeight == 2640 and .squarePixels == true' \
            stage18-full64-v2-map-raster-validation.json
          python tools/validate_stage18_full64_v3_map_raster.py \
            stage18-contract-mesh/onga_stage16_metric_fv_mesh_v2.npz \
            --output stage18-full64-v3-map-raster-validation.json
          jq -e \
            '.status == "passed" and .numericalCasesStarted == 0 and
             .representedCellCount == 50129 and .coverageFraction == 1 and
             .minimumPixelsPerCell >= 1 and .cell320PixelCount >= 1 and
             .pngWidth == 3840 and .pngHeight == 2640 and .squarePixels == true' \
            stage18-full64-v3-map-raster-validation.json
          python - <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, 'tools')
          from run_stage18_full64 import validate_authorization, validate_mesh_package, validate_mesh_summary

          authorization = json.loads(Path('config/stage18_full64_run_authorization_v1.json').read_text())
          summary_path = 'stage18-contract-mesh/stage16_metric_mesh_summary.json'
          mesh_path = 'stage18-contract-mesh/onga_stage16_metric_fv_mesh_v2.npz'
          validate_authorization(authorization)

          rejected = {}
          for label, check in (
              ('summary', lambda: validate_mesh_summary(json.loads(Path(summary_path).read_text()), authorization, summary_path)),
              ('package', lambda: validate_mesh_package(mesh_path, authorization)),
          ):
              try:
                  check()
              except RuntimeError as error:
                  rejected[label] = str(error)
          if set(rejected) != {'summary', 'package'}:
              raise RuntimeError('candidate mesh must be rejected by both retired mesh bindings')

          report = {
              'schema': 'onga-stage18-full64-pending-mesh-validation-v1',
              'status': 'passed',
              'full64Executed': False,
              'retiredAuthorizationRejected': True,
              'rejections': rejected,
              'candidateArtifacts': {
                  'summarySha256': hashlib.sha256(Path(summary_path).read_bytes()).hexdigest(),
                  'packageSha256': hashlib.sha256(Path(mesh_path).read_bytes()).hexdigest(),
              },
          }
          Path('stage18-full64-pending-mesh-validation.json').write_text(
              f'{json.dumps(report, indent=2)}\n', encoding='utf-8'
          )
          PY
      - name: Verify validation reports
        run: |
          test -s stage18-full64-workflow-validation.json
          test -s stage18-full64-gate-validation.json
          test -s stage18-full64-pending-mesh-validation.json
          test -s stage18-full64-execution-contract-v2-validation.json
          test -s stage18-full64-v2-negative-validation.json
          test -s stage18-full64-v2-evaluator-validation.json
          test -s stage18-full64-v2-map-raster-validation.json
          test -s stage18-full64-v2-workflow-validation.json
          test -s stage18-full64-v3-control-validation.json
          test -s stage18-full64-v3-map-raster-validation.json
          test -s stage18-full64-v3-workflow-validation.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
