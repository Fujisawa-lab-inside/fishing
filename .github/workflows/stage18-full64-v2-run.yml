name: Stage 18 corrected v2 one-time full64 numerical run
run-name: Stage 18 corrected v2 one-time run ${{ github.run_id }}

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Exact confirmation phrase for the one authorized corrected-v2 64-case run'
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'

concurrency:
  group: stage18-full64-v2-one-time
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      authorization-id: ${{ steps.authorization.outputs.id }}
    steps:
      - name: Validate dispatch identity and scope
        env:
          ACTOR: ${{ github.actor }}
          CONFIRMATION: ${{ inputs.confirmation }}
          REF: ${{ github.ref }}
          REPOSITORY: ${{ github.repository }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = 'RUN_STAGE18_FULL64_V2_ONCE'
          test "$REPOSITORY" = 'Fujisawa-lab-inside/fishing'
          test "$ACTOR" = 'RyusukeFujisawa'
          test "$REF" = 'refs/heads/main'
          test "$RUN_ATTEMPT" = '1'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate active v2 authorization and immutable contract
        run: |
          set -euo pipefail
          node tools/validate_stage18_full64_gate.mjs --require-active \
            --output "$RUNNER_TEMP/stage18-full64-gate-validation.json"
          node tools/validate_stage18_full64_execution_contract_v2.mjs \
            "$RUNNER_TEMP/stage18-full64-execution-contract-v2-validation.json"
      - name: Record authorization identity
        id: authorization
        run: |
          set -euo pipefail
          authorization_id="$(jq -er '.authorizationId' config/stage18_full64_run_authorization_v2.json)"
          test -n "$authorization_id"
          echo "id=$authorization_id" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - name: Validate result packaging with non-run fixtures
        run: python tools/validate_stage18_full64_v2_evaluator.py --require-numeric-fixture
      - name: Generate exact corrected-v2 mesh and ensemble
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: |
          set -euo pipefail
          test ! -e "$WORK_DIR"
          python tools/generate_stage16_metric_mesh.py \
            --repo-root . \
            --output "$WORK_DIR" \
            --water-manifest data/onga_unified_water_manifest_r3.json \
            --constraints data/onga_stage16_mesh_constraints_v2.json
          node onga_stage18_inference_ensemble_v2.mjs \
            config/stage17_inferred_physical_prior_v1.json \
            "$WORK_DIR/ensemble-v2.json"
      - name: Validate all inputs without starting a numerical case
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: |
          set -euo pipefail
          python tools/preflight_stage18_full64_v2.py \
            "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz" \
            "$WORK_DIR/ensemble-v2.json" \
            config/stage18_full64_run_authorization_v2.json \
            --mesh-summary "$WORK_DIR/stage16_metric_mesh_summary.json" \
            --fields-output "$WORK_DIR/full64-fields.npz" \
            --report-output "$WORK_DIR/full64-report.json" \
            --progress-output "$WORK_DIR/full64-progress.json" \
            --repo-root . \
            > "$WORK_DIR/preflight.json"
          jq -e '.status == "passed" and .numericalCasesStarted == 0 and .outputsCreated == 0' \
            "$WORK_DIR/preflight.json"
      - uses: actions/upload-artifact@v4
        with:
          name: stage18-full64-v2-preflight-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage18-full64-v2/onga_stage16_metric_fv_mesh_v2.npz
            ${{ runner.temp }}/stage18-full64-v2/stage16_metric_mesh_summary.json
            ${{ runner.temp }}/stage18-full64-v2/ensemble-v2.json
            ${{ runner.temp }}/stage18-full64-v2/preflight.json
          if-no-files-found: error
          retention-days: 7

  authorize:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Revalidate dispatch before consumption
        env:
          ACTOR: ${{ github.actor }}
          AUTHORIZATION_ID: ${{ needs.preflight.outputs.authorization-id }}
          CONFIRMATION: ${{ inputs.confirmation }}
          REF: ${{ github.ref }}
          REPOSITORY: ${{ github.repository }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = 'RUN_STAGE18_FULL64_V2_ONCE'
          test "$REPOSITORY" = 'Fujisawa-lab-inside/fishing'
          test "$ACTOR" = 'RyusukeFujisawa'
          test "$REF" = 'refs/heads/main'
          test "$RUN_ATTEMPT" = '1'
          test -n "$AUTHORIZATION_ID"
      - name: Consume v2 one-time authorization
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          prior_run_ids="$(
            gh api --paginate \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${REPOSITORY}/actions/workflows/stage18-full64-v2-run.yml/runs?event=workflow_dispatch&per_page=100" \
              --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | .id"
          )"
          while IFS= read -r prior_run_id; do
            test -n "$prior_run_id" || continue
            jobs_json="$(
              gh api \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "/repos/${REPOSITORY}/actions/runs/${prior_run_id}/jobs?filter=all&per_page=100"
            )"
            if jq -e '[.jobs[].steps[]? | select(.name == "Consume v2 one-time authorization" and .conclusion == "success")] | length > 0' \
              <<<"$jobs_json" >/dev/null; then
              echo "The corrected-v2 one-time path was already consumed by run ${prior_run_id}." >&2
              echo 'A new reviewed execution path and new explicit authorization are required.' >&2
              exit 1
            fi
          done <<<"$prior_run_ids"

  full64:
    needs: [preflight, authorize]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Reject rerun attempts
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test "$RUN_ATTEMPT" = '1'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - uses: actions/download-artifact@v4
        with:
          name: stage18-full64-v2-preflight-${{ github.run_id }}
          path: ${{ runner.temp }}/stage18-full64-v2
      - name: Revalidate downloaded preflight inputs
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: |
          set -euo pipefail
          python tools/preflight_stage18_full64_v2.py \
            "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz" \
            "$WORK_DIR/ensemble-v2.json" \
            config/stage18_full64_run_authorization_v2.json \
            --mesh-summary "$WORK_DIR/stage16_metric_mesh_summary.json" \
            --fields-output "$WORK_DIR/full64-fields.npz" \
            --report-output "$WORK_DIR/full64-report.json" \
            --progress-output "$WORK_DIR/full64-progress.json" \
            --repo-root . \
            > "$WORK_DIR/preflight-recheck.json"
          cmp "$WORK_DIR/preflight.json" "$WORK_DIR/preflight-recheck.json"
      - name: Create consumed-authorization receipt
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: |
          set -euo pipefail
          python tools/create_stage18_full64_v2_execution_receipt.py \
            "$WORK_DIR/preflight-recheck.json" \
            --repo-root . \
            --output "$WORK_DIR/execution-receipt.json"
      - name: Run exactly 64 corrected-v2 numerical cases
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: >-
          timeout --signal=TERM --kill-after=30s 65m
          python tools/run_stage18_full64_v2.py
          "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz"
          "$WORK_DIR/ensemble-v2.json"
          config/stage18_full64_run_authorization_v2.json
          --mesh-summary "$WORK_DIR/stage16_metric_mesh_summary.json"
          --fields-output "$WORK_DIR/full64-fields.npz"
          --report-output "$WORK_DIR/full64-report.json"
          --progress-output "$WORK_DIR/full64-progress.json"
          --repo-root .
      - name: Evaluate provenance and numerical acceptance
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: >-
          python tools/evaluate_stage18_full64_v2.py
          config/stage18_full64_execution_contract_v2.json
          config/stage18_full64_run_authorization_v2.json
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-fields.npz"
          "$WORK_DIR/full64-evaluation.json"
      - name: Aggregate statistics and render five bound maps
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: >-
          python tools/aggregate_stage18_full64_v2.py
          "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz"
          "$WORK_DIR/full64-fields.npz"
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-evaluation.json"
          config/stage18_full64_run_authorization_v2.json
          config/stage18_full64_execution_contract_v2.json
          --output-dir "$WORK_DIR/visual"
      - name: Render user judgment image
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: >-
          python tools/render_stage18_full64_decision_v2.py
          config/stage18_full64_execution_contract_v2.json
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-evaluation.json"
          --map-dir "$WORK_DIR/visual"
          --manifest "$WORK_DIR/visual/full64-visual-manifest.json"
          --progress "$WORK_DIR/full64-progress.json"
          --output "$WORK_DIR/full64-judgment.svg"
      - name: Verify complete success package
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: |
          set -euo pipefail
          test -s "$WORK_DIR/execution-receipt.json"
          test -s "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz"
          test -s "$WORK_DIR/stage16_metric_mesh_summary.json"
          test -s "$WORK_DIR/ensemble-v2.json"
          test -s "$WORK_DIR/full64-progress.json"
          test -s "$WORK_DIR/full64-report.json"
          test -s "$WORK_DIR/full64-fields.npz"
          test -s "$WORK_DIR/full64-evaluation.json"
          test -s "$WORK_DIR/visual/full64-statistics.npz"
          test -s "$WORK_DIR/visual/full64-statistics-summary.json"
          test -s "$WORK_DIR/visual/full64-depth-median.png"
          test -s "$WORK_DIR/visual/full64-velocity-median.png"
          test -s "$WORK_DIR/visual/full64-wet-probability.png"
          test -s "$WORK_DIR/visual/full64-direction-agreement.png"
          test -s "$WORK_DIR/visual/full64-direction-support.png"
          test -s "$WORK_DIR/visual/full64-visual-manifest.json"
          test -s "$WORK_DIR/full64-judgment.svg"
          grep -F '判定: PASS / RESULT: PASS' "$WORK_DIR/full64-judgment.svg"
      - uses: actions/upload-artifact@v4
        with:
          name: stage18-full64-v2-results-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage18-full64-v2/execution-receipt.json
            ${{ runner.temp }}/stage18-full64-v2/onga_stage16_metric_fv_mesh_v2.npz
            ${{ runner.temp }}/stage18-full64-v2/stage16_metric_mesh_summary.json
            ${{ runner.temp }}/stage18-full64-v2/ensemble-v2.json
            ${{ runner.temp }}/stage18-full64-v2/full64-progress.json
            ${{ runner.temp }}/stage18-full64-v2/full64-report.json
            ${{ runner.temp }}/stage18-full64-v2/full64-fields.npz
            ${{ runner.temp }}/stage18-full64-v2/full64-evaluation.json
            ${{ runner.temp }}/stage18-full64-v2/visual
            ${{ runner.temp }}/stage18-full64-v2/full64-judgment.svg
          if-no-files-found: error
          retention-days: 90
      - name: Attempt fail-closed STOP image
        if: ${{ failure() || cancelled() }}
        env:
          WORK_DIR: ${{ runner.temp }}/stage18-full64-v2
        run: >-
          python tools/render_stage18_full64_decision_v2.py
          config/stage18_full64_execution_contract_v2.json
          "$WORK_DIR/full64-report.json"
          "$WORK_DIR/full64-evaluation.json"
          --map-dir "$WORK_DIR/visual"
          --manifest "$WORK_DIR/visual/full64-visual-manifest.json"
          --progress "$WORK_DIR/full64-progress.json"
          --output "$WORK_DIR/full64-diagnostic-stop.svg"
      - uses: actions/upload-artifact@v4
        if: ${{ failure() || cancelled() }}
        with:
          name: stage18-full64-v2-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage18-full64-v2/execution-receipt.json
            ${{ runner.temp }}/stage18-full64-v2/preflight.json
            ${{ runner.temp }}/stage18-full64-v2/preflight-recheck.json
            ${{ runner.temp }}/stage18-full64-v2/full64-progress.json
            ${{ runner.temp }}/stage18-full64-v2/full64-report.json
            ${{ runner.temp }}/stage18-full64-v2/full64-evaluation.json
            ${{ runner.temp }}/stage18-full64-v2/visual/full64-statistics-summary.json
            ${{ runner.temp }}/stage18-full64-v2/visual/full64-visual-manifest.json
            ${{ runner.temp }}/stage18-full64-v2/full64-diagnostic-stop.svg
          if-no-files-found: warn
          retention-days: 90
