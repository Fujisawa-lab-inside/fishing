<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1800" viewBox="0 0 1600 1800" role="img" aria-labelledby="title desc">
  <title id="title">橋下補正v2を使う64条件数値計算の実行判断</title>
  <desc id="desc">承認済み形状、64条件500ステップ、数値計算の60分と8GiBの合格上限、65分の強制停止、ワークフロー全工程の最大約130分とGitHub待ち時間が別であること、即時停止条件、出力画像、判断できない範囲を示し、承認後24時間以内の一回限りの実行可否だけを選ぶ資料。</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif; fill: #17352b; }
    .title { font-size: 48px; font-weight: 700; fill: #ffffff; }
    .subtitle { font-size: 25px; fill: #dff6ec; }
    .badge { font-size: 22px; font-weight: 700; }
    .metric-label { font-size: 21px; fill: #5f786e; }
    .metric-value { font-size: 38px; font-weight: 700; }
    .metric-note { font-size: 19px; fill: #5f786e; }
    .section { font-size: 31px; font-weight: 700; }
    .flow-main { font-size: 24px; font-weight: 700; }
    .flow-sub { font-size: 19px; fill: #607a70; }
    .row-label { font-size: 21px; fill: #607a70; }
    .row-value { font-size: 22px; font-weight: 600; }
    .body { font-size: 22px; }
    .stop { font-size: 24px; font-weight: 700; fill: #991b1b; }
    .boundary { font-size: 21px; fill: #334f45; }
    .question { font-size: 33px; font-weight: 700; fill: #ffffff; }
    .choice { font-size: 26px; font-weight: 700; }
    .choice-light { font-size: 26px; font-weight: 700; fill: #ffffff; }
    .foot { font-size: 18px; fill: #607a70; }
  </style>

  <rect width="1600" height="1800" fill="#f5f9f7"/>

  <rect x="40" y="35" width="1520" height="175" rx="28" fill="#126a4d"/>
  <text x="85" y="105" class="title">判断するのは「64条件の計算を開始してよいか」だけ</text>
  <text x="88" y="157" class="subtitle">河道・橋下の形状判断は完了済み。計算はまだ開始していません。</text>

  <rect x="65" y="238" width="280" height="50" rx="25" fill="#d9f2e7"/>
  <text x="205" y="271" text-anchor="middle" class="badge" fill="#14583f">形状：承認済み</text>
  <rect x="365" y="238" width="280" height="50" rx="25" fill="#fff0c2"/>
  <text x="505" y="271" text-anchor="middle" class="badge" fill="#725208">計算：未開始</text>

  <g transform="translate(65 320)">
    <rect width="460" height="150" rx="22" fill="#ffffff" stroke="#cfddd6" stroke-width="2"/>
    <text x="28" y="38" class="metric-label">条件数</text>
    <text x="28" y="88" class="metric-value">64</text>
    <text x="28" y="123" class="metric-note">承認後24時間以内に一回だけ</text>
  </g>
  <g transform="translate(570 320)">
    <rect width="460" height="150" rx="22" fill="#ffffff" stroke="#cfddd6" stroke-width="2"/>
    <text x="28" y="38" class="metric-label">各条件</text>
    <text x="28" y="88" class="metric-value">500 steps</text>
    <text x="28" y="123" class="metric-note">最大32,000 case-steps</text>
  </g>
  <g transform="translate(1075 320)">
    <rect width="460" height="150" rx="22" fill="#ffffff" stroke="#cfddd6" stroke-width="2"/>
    <text x="28" y="38" class="metric-label">数値計算の合格上限</text>
    <text x="28" y="88" class="metric-value">60分・8 GiB</text>
    <text x="28" y="123" class="metric-note">全工程は最大約130分（待ち時間別）</text>
  </g>

  <text x="65" y="535" class="section">何が行われるか</text>
  <line x1="250" y1="620" x2="1350" y2="620" stroke="#bfd1c8" stroke-width="5"/>
  <g transform="translate(220 580)">
    <circle cx="40" cy="40" r="40" fill="#d9f2e7" stroke="#79aa94" stroke-width="3"/>
    <path d="M20 40 l14 14 l27 -31" fill="none" stroke="#126a4d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="112" text-anchor="middle" class="flow-main">橋下補正 v2</text>
    <text x="40" y="143" text-anchor="middle" class="flow-sub">680,633画素</text>
    <text x="40" y="168" text-anchor="middle" class="flow-sub">50,129セル</text>
  </g>
  <g transform="translate(730 580)">
    <circle cx="40" cy="40" r="40" fill="#fff0c2" stroke="#c7a64d" stroke-width="3"/>
    <path d="M29 20 l31 20 l-31 20 z" fill="#725208"/>
    <text x="40" y="112" text-anchor="middle" class="flow-main">64条件を一回</text>
    <text x="40" y="143" text-anchor="middle" class="flow-sub">数値安定性の確認だけ</text>
  </g>
  <g transform="translate(1240 580)">
    <circle cx="40" cy="40" r="40" fill="#e7ece9" stroke="#a8bbb2" stroke-width="3"/>
    <rect x="19" y="22" width="42" height="34" rx="4" fill="none" stroke="#516a60" stroke-width="4"/>
    <path d="M23 48 l11 -10 l8 7 l8 -13 l8 16" fill="none" stroke="#516a60" stroke-width="4"/>
    <text x="40" y="112" text-anchor="middle" class="flow-main">結果を画像確認</text>
    <text x="40" y="143" text-anchor="middle" class="flow-sub">合否表＋5枚の地図</text>
  </g>

  <rect x="65" y="805" width="715" height="405" rx="22" fill="#ffffff" stroke="#cfddd6" stroke-width="2"/>
  <text x="100" y="855" class="section">64条件で変えるもの</text>
  <text x="100" y="905" class="row-label">本流の想定水深</text>
  <text x="390" y="905" class="row-value">2〜6 m</text>
  <text x="100" y="955" class="row-label">河道の流れにくさ</text>
  <text x="390" y="955" class="row-value">0.020〜0.045</text>
  <text x="100" y="1005" class="row-label">潮位タイミング</text>
  <text x="390" y="1005" class="row-value">−90〜＋90分</text>
  <text x="100" y="1055" class="row-label">魚道</text>
  <text x="390" y="1055" class="row-value">停止32件／使用32件</text>
  <text x="100" y="1105" class="row-label">魚道係数・面積</text>
  <text x="390" y="1105" class="row-value">0.35〜0.85・0.2〜4.0 m²</text>
  <text x="100" y="1155" class="row-label">河口堰</text>
  <text x="390" y="1155" class="row-value">全閉16件／開48件</text>

  <rect x="820" y="805" width="715" height="405" rx="22" fill="#ffffff" stroke="#cfddd6" stroke-width="2"/>
  <text x="855" y="855" class="section">実行後に見るもの</text>
  <text x="855" y="905" class="row-label">合否表</text>
  <text x="1095" y="905" class="row-value">64/64・異常値・安定性</text>
  <text x="1095" y="937" class="row-value">質量保存・時間・メモリ</text>
  <text x="855" y="995" class="row-label">地図 1</text>
  <text x="1095" y="995" class="row-value">想定水深の中央値</text>
  <text x="855" y="1045" class="row-label">地図 2</text>
  <text x="1095" y="1045" class="row-value">想定流速の中央値</text>
  <text x="855" y="1095" class="row-label">地図 3〜5</text>
  <text x="1095" y="1095" class="row-value">水の有無・流向の一致</text>
  <text x="1095" y="1127" class="row-value">比較できた件数</text>
  <text x="855" y="1177" class="row-label">比較方法</text>
  <text x="1095" y="1177" class="row-value">同じstep数（同じ時刻ではない）</text>

  <rect x="65" y="1245" width="1470" height="255" rx="22" fill="#fff5f3" stroke="#d77062" stroke-width="3"/>
  <text x="100" y="1295" class="stop">1件でも異常なら直ちにSTOP</text>
  <text x="105" y="1340" class="body">• 入力・格子IDが違う場合は、0件のまま開始前に停止</text>
  <text x="105" y="1383" class="body">• 失敗、異常値、負の水深、CFL &gt; 0.95、質量誤差 &gt; 1e−8</text>
  <text x="105" y="1426" class="body">• 数値計算は60分または8 GiB超過でSTOP、65分で強制停止</text>
  <text x="105" y="1469" class="body">• 自動再実行・失敗値の補完・追加計算はしない</text>

  <rect x="65" y="1530" width="860" height="205" rx="22" fill="#eef3f0" stroke="#bdcdc5" stroke-width="2"/>
  <text x="100" y="1578" class="section">この計算だけでは判断できないこと</text>
  <text x="105" y="1622" class="boundary">• 実際の川の流れと一致するか</text>
  <text x="105" y="1662" class="boundary">• 魚が釣れる場所か、感度分析として正しいか</text>
  <text x="105" y="1702" class="boundary">• 公開シミュレータへ反映してよいか</text>

  <rect x="960" y="1530" width="575" height="205" rx="22" fill="#126a4d"/>
  <text x="1247" y="1580" text-anchor="middle" class="question">判断は二択</text>
  <text x="1247" y="1645" text-anchor="middle" class="choice-light">実行許可 ／ 保留</text>
  <text x="1247" y="1698" text-anchor="middle" class="subtitle">画像外の操作ボタンで選択</text>

  <text x="65" y="1775" class="foot">この資料は実行許可の判断専用です。形状承認・物理Validation・公開反映の判断とは別です。</text>
</svg>
