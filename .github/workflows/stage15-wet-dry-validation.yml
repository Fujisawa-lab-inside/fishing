name: Stage 15 wet-dry validation

on:
  pull_request:
    paths:
      - 'onga_stage15_wetting_drying_state.mjs'
      - 'tools/validate_stage15_wetting_drying_state.mjs'
      - 'docs/STAGE15_WET_DRY_HYSTERESIS_VERIFICATION.md'
      - '.github/workflows/stage15-wet-dry-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'onga_stage15_wetting_drying_state.mjs'
      - 'tools/validate_stage15_wetting_drying_state.mjs'
      - 'docs/STAGE15_WET_DRY_HYSTERESIS_VERIFICATION.md'
      - '.github/workflows/stage15-wet-dry-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-wet-dry-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax-check wet-dry modules
        run: |
          node --check onga_stage15_wetting_drying_state.mjs
          node --check tools/validate_stage15_wetting_drying_state.mjs
      - name: Validate wet-dry hysteresis and regularisation
        run: node tools/validate_stage15_wetting_drying_state.mjs stage15-wet-dry-validation.json
      - name: Upload wet-dry verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage15-wet-dry-validation
          path: stage15-wet-dry-validation.json
          if-no-files-found: warn
