name: Stage 20 one-time physical pilot v2
run-name: Stage 20 one-time physical pilot v2 ${{ github.run_id }}

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'

concurrency:
  group: stage20-physical-pilot-v2-one-time
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate exact v2 one-time control plane before dependencies
        run: python tools/run_stage20_physical_pilot_v2.py --repo-root . --preflight-only
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned numerical dependencies
        run: |
          python -m pip install -r tools/requirements-stage16-metric-mesh.txt
          python -m pip install pillow==12.3.0
      - name: Revalidate optimized inactive paths
        run: python tools/validate_stage20_offline_precompute_runner.py

  authorize:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Consume Stage 20 physical pilot v2 authorization
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          prior_run_ids="$(
            gh api --paginate \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${REPOSITORY}/actions/workflows/stage20-physical-pilot-v2.yml/runs?event=workflow_dispatch&per_page=100" \
              --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | .id"
          )"
          while IFS= read -r prior_run_id; do
            test -n "$prior_run_id" || continue
            jobs_json="$(
              gh api --paginate --slurp \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "/repos/${REPOSITORY}/actions/runs/${prior_run_id}/jobs?filter=all&per_page=100"
            )"
            if jq -e '[.[].jobs[].steps[]? | select(.name == "Consume Stage 20 physical pilot v2 authorization" and .conclusion == "success")] | length > 0' \
              <<<"$jobs_json" >/dev/null; then
              echo "Stage 20 physical-pilot-v2 authorization was already consumed by run ${prior_run_id}." >&2
              exit 1
            fi
          done <<<"$prior_run_ids"

  numerical:
    needs: [preflight, authorize]
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned numerical dependencies
        run: |
          python -m pip install -r tools/requirements-stage16-metric-mesh.txt
          python -m pip install pillow==12.3.0
      - name: Revalidate v2 one-time authorization
        run: python tools/run_stage20_physical_pilot_v2.py --repo-root . --preflight-only
      - name: Run exactly one 600-second mesh-v2 physical pilot
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-physical-pilot-v2
        run: >-
          timeout --signal=TERM --kill-after=30s 60m
          python tools/run_stage20_physical_pilot_v2.py
          --repo-root .
          --output-dir "$WORK_DIR"
      - name: Render the four approved mesh-v2 views
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-physical-pilot-v2
        run: >-
          PYTHONPATH=tools python tools/render_stage20_hybrid_physical_pilot_views.py
          "$WORK_DIR/pilot-final-fields.npz"
          --repo-root .
          --mesh-manifest public/data/onga/stage20/mesh-v2.json
          --manifest-schema onga-stage20-physical-pilot-v2-visual-manifest-v1
          --output-dir "$WORK_DIR/maps"
          --manifest-output "$WORK_DIR/pilot-visual-manifest.json"
      - name: Seal numerical and visual v2 evidence
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-physical-pilot-v2
        run: >-
          python tools/seal_stage20_hybrid_physical_pilot_evidence.py
          "$WORK_DIR"
          --expected-cell-count 50199
          --manifest-schema onga-stage20-physical-pilot-v2-evidence-v1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stage20-physical-pilot-v2-${{ github.run_id }}
          path: ${{ runner.temp }}/stage20-physical-pilot-v2
          if-no-files-found: error
          retention-days: 90
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ failure() || cancelled() }}
        with:
          name: stage20-physical-pilot-v2-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/stage20-physical-pilot-v2
          if-no-files-found: warn
          retention-days: 30
