name: Stage 16 benchmark metrics validation

on:
  pull_request:
    paths:
      - 'onga_stage16_benchmark_metrics.mjs'
      - 'tools/validate_stage16_benchmark_metrics.mjs'
      - 'docs/STAGE16_BENCHMARK_METRICS.md'
      - '.github/workflows/stage16-benchmark-metrics-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'onga_stage16_benchmark_metrics.mjs'
      - 'tools/validate_stage16_benchmark_metrics.mjs'
      - 'docs/STAGE16_BENCHMARK_METRICS.md'
      - '.github/workflows/stage16-benchmark-metrics-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-benchmark-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax-check benchmark metrics
        run: |
          node --check onga_stage16_benchmark_metrics.mjs
          node --check tools/validate_stage16_benchmark_metrics.mjs
      - name: Validate benchmark metrics
        run: node tools/validate_stage16_benchmark_metrics.mjs stage16-benchmark-metrics-validation.json
      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: stage16-benchmark-metrics-validation
          path: stage16-benchmark-metrics-validation.json
