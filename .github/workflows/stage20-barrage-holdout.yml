      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with: {python-version: '3.13', cache: pip, cache-dependency-path: 'tools/requirements-stage20-kernel-v3.txt'}
      - run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt && python -m pip install -r tools/requirements-stage20-kernel-v3.txt
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: barrage-closed-s01-${{ github.run_id }}
          path: ${{ runner.temp }}/input
      - name: Run barrage-closed-s02
        run: timeout --signal=TERM --kill-after=30s 5h python tools/run_stage20_barrage_holdout_segment.py --repo-root . --job-id barrage-closed-s02 --input-restart "$RUNNER_TEMP/input/restart-final.npz" --output-dir "$RUNNER_TEMP/output"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ always() }}
        with:
          name: barrage-closed-s02-${{ github.run_id }}
