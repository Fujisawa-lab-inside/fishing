name: Stage 19 one-time full64 run
run-name: Stage 19 one-time full64 run ${{ github.run_id }}

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'

concurrency:
  group: stage19-full64-one-time
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate trigger identity
        env:
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test "$ACTOR" = 'RyusukeFujisawa'
          test "$REF" = 'refs/heads/codex/stage19-public-inference-inputs'
          test "$RUN_ATTEMPT" = '1'
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned numerical dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - name: Validate active one-time control plane
        run: python tools/validate_stage19_full64_control_v1.py --repo-root .
      - name: Revalidate synthetic integration and inactive contracts
        run: |
          python tools/validate_stage19_solver_integration.py --output "${RUNNER_TEMP}/stage19-synthetic.json"
          python tools/validate_stage19_execution_readiness.py
      - name: Generate exact canonical Linux mesh
        env:
          WORK_DIR: ${{ runner.temp }}/stage19-full64
        run: |
          set -euo pipefail
          test ! -e "$WORK_DIR"
          python tools/generate_stage16_metric_mesh.py \
            --repo-root . \
            --output "$WORK_DIR" \
            --water-manifest data/onga_unified_water_manifest_r3.json \
            --constraints data/onga_stage16_mesh_constraints_v2.json
      - name: Run canonical zero-step input preflight
        env:
          WORK_DIR: ${{ runner.temp }}/stage19-full64
        run: |
          set -euo pipefail
          PYTHONPATH=tools python tools/preflight_stage19_solver_integration.py \
            --mesh "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz" \
            --mesh-summary "$WORK_DIR/stage16_metric_mesh_summary.json" \
            --output "$WORK_DIR/canonical-zero-case-preflight.json"
          jq -e '
            .status == "passed"
            and .mesh.canonical == true
            and .mesh.cellCount == 50129
            and .approvedInputDimensionsReached == 16
            and .safeguards.numericalTimeStepFunctionCalled == false
            and .safeguards.productionMeshNumericalCaseStarted == false
          ' "$WORK_DIR/canonical-zero-case-preflight.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stage19-full64-preflight-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/stage19-full64/onga_stage16_metric_fv_mesh_v2.npz
            ${{ runner.temp }}/stage19-full64/stage16_metric_mesh_summary.json
            ${{ runner.temp }}/stage19-full64/canonical-zero-case-preflight.json
          if-no-files-found: error
          retention-days: 7

  authorize:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Consume Stage 19 one-time authorization
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          prior_run_ids="$(
            gh api --paginate \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${REPOSITORY}/actions/workflows/stage19-full64-one-time-run.yml/runs?event=push&per_page=100" \
              --jq ".workflow_runs[] | select(.id != ${RUN_ID}) | .id"
          )"
          while IFS= read -r prior_run_id; do
            test -n "$prior_run_id" || continue
            jobs_json="$(
              gh api --paginate --slurp \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "/repos/${REPOSITORY}/actions/runs/${prior_run_id}/jobs?filter=all&per_page=100"
            )"
            if jq -e '[.[].jobs[].steps[]? | select(.name == "Consume Stage 19 one-time authorization" and .conclusion == "success")] | length > 0' \
              <<<"$jobs_json" >/dev/null; then
              echo "Stage 19 one-time authorization already consumed by run ${prior_run_id}." >&2
              exit 1
            fi
          done <<<"$prior_run_ids"

  numerical:
    needs: [preflight, authorize]
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt
      - name: Install pinned numerical dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: stage19-full64-preflight-${{ github.run_id }}
          path: ${{ runner.temp }}/stage19-full64
      - name: Revalidate control and canonical zero-step evidence
        env:
          WORK_DIR: ${{ runner.temp }}/stage19-full64
        run: |
          set -euo pipefail
          python tools/validate_stage19_full64_control_v1.py --repo-root .
          jq -e '.status == "passed" and .mesh.canonical == true and .safeguards.productionMeshNumericalCaseStarted == false' \
            "$WORK_DIR/canonical-zero-case-preflight.json"
      - name: Run exactly 64 Stage 19 cases once
        env:
          WORK_DIR: ${{ runner.temp }}/stage19-full64
        run: >-
          timeout --signal=TERM --kill-after=30s 60m
          python tools/run_stage19_full64_v1.py
          "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz"
          --fields-output "$WORK_DIR/full64-fields.npz"
          --report-output "$WORK_DIR/full64-report.json"
          --progress-output "$WORK_DIR/full64-progress.json"
          --repo-root .
      - name: Aggregate accepted step-matched fields
        env:
          WORK_DIR: ${{ runner.temp }}/stage19-full64
        run: >-
          python tools/aggregate_stage19_full64_v1.py
          "$WORK_DIR/full64-fields.npz"
          "$WORK_DIR/full64-report.json"
          --statistics-output "$WORK_DIR/full64-statistics.npz"
          --summary-output "$WORK_DIR/full64-statistics-summary.json"
      - name: Render exactly five complete-cell maps
        env:
          WORK_DIR: ${{ runner.temp }}/stage19-full64
        run: >-
          python tools/render_stage19_full64_maps_v1.py
          "$WORK_DIR/onga_stage16_metric_fv_mesh_v2.npz"
          "$WORK_DIR/full64-statistics.npz"
          "$WORK_DIR/full64-statistics-summary.json"
          --output-dir "$WORK_DIR/maps"
      - name: Seal numerical and visual evidence
        env:
          WORK_DIR: ${{ runner.temp }}/stage19-full64
        run: >-
          python tools/seal_stage19_full64_evidence_v1.py
          "$WORK_DIR"
          --output "$WORK_DIR/full64-evidence-manifest.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stage19-full64-results-${{ github.run_id }}
          path: ${{ runner.temp }}/stage19-full64
          if-no-files-found: error
          retention-days: 90
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ failure() || cancelled() }}
        with:
          name: stage19-full64-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/stage19-full64
          if-no-files-found: warn
          retention-days: 30
