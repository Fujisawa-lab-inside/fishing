name: Stage 18 full64 contract validation

on:
  pull_request:
    paths:
      - 'config/stage18_full64_execution_gate_v1.json'
      - 'config/stage18_full64_run_authorization_v1.json'
      - 'config/stage17_inferred_physical_prior_v1.json'
      - 'data/onga_stage16_mesh_constraints_v*.json'
      - 'data/onga_unified_water_manifest_r*.json'
      - 'data/onga_water_rows_r*_*.json'
      - 'onga_stage18_full64_evaluator.mjs'
      - 'onga_stage18_inference_ensemble.mjs'
      - 'tools/evaluate_stage18_full64.mjs'
      - 'tools/generate_stage16_metric_mesh.py'
      - 'tools/run_stage18_full64.py'
      - 'tools/aggregate_stage18_full64.py'
      - 'tools/render_stage18_full64_visuals.py'
      - 'tools/render_stage18_full64_diagnostic.py'
      - 'tools/run_stage18_production_mesh_pilot.py'
      - 'tools/requirements-stage16-metric-mesh.txt'
      - 'tools/validate_stage18_full64.mjs'
      - 'tools/validate_stage18_full64_gate.mjs'
      - 'tools/validate_stage18_full64_artifacts.py'
      - 'tools/validate_stage18_full64_workflow.mjs'
      - 'docs/STAGE18_FULL64_RUN.md'
      - 'docs/WORK_HANDOFF.md'
      - '.github/workflows/stage18-full64-validation.yml'
      - '.github/workflows/stage18-full64-run.yml'
      - '.github/workflows/stage18-production-pilot-run.yml'
      - '.github/workflows/stage16-metric-mesh-generation.yml'
  push:
    branches: [main]
    paths:
      - 'config/stage18_full64_execution_gate_v1.json'
      - 'config/stage18_full64_run_authorization_v1.json'
      - 'config/stage17_inferred_physical_prior_v1.json'
      - 'data/onga_stage16_mesh_constraints_v*.json'
      - 'data/onga_unified_water_manifest_r*.json'
      - 'data/onga_water_rows_r*_*.json'
      - 'onga_stage18_full64_evaluator.mjs'
      - 'onga_stage18_inference_ensemble.mjs'
      - 'tools/evaluate_stage18_full64.mjs'
      - 'tools/generate_stage16_metric_mesh.py'
      - 'tools/run_stage18_full64.py'
      - 'tools/aggregate_stage18_full64.py'
      - 'tools/render_stage18_full64_visuals.py'
      - 'tools/render_stage18_full64_diagnostic.py'
      - 'tools/run_stage18_production_mesh_pilot.py'
      - 'tools/requirements-stage16-metric-mesh.txt'
      - 'tools/validate_stage18_full64.mjs'
      - 'tools/validate_stage18_full64_gate.mjs'
      - 'tools/validate_stage18_full64_artifacts.py'
      - 'tools/validate_stage18_full64_workflow.mjs'
      - 'docs/STAGE18_FULL64_RUN.md'
      - 'docs/WORK_HANDOFF.md'
      - '.github/workflows/stage18-full64-validation.yml'
      - '.github/workflows/stage18-full64-run.yml'
      - '.github/workflows/stage18-production-pilot-run.yml'
      - '.github/workflows/stage16-metric-mesh-generation.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pinned mesh and validation dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt
      - name: Syntax checks
        run: |
          node --check onga_stage18_full64_evaluator.mjs
          node --check tools/evaluate_stage18_full64.mjs
          node --check tools/validate_stage18_full64.mjs
          node --check tools/validate_stage18_full64_gate.mjs
          node --check tools/validate_stage18_full64_workflow.mjs
          python -m py_compile tools/run_stage18_production_mesh_pilot.py tools/run_stage18_full64.py tools/aggregate_stage18_full64.py tools/render_stage18_full64_visuals.py tools/render_stage18_full64_diagnostic.py tools/validate_stage18_full64_artifacts.py
      - name: Validate one-time workflow safeguards
        run: node tools/validate_stage18_full64_workflow.mjs
      - name: Validate disabled execution gate and retired authorization
        run: node tools/validate_stage18_full64_gate.mjs
      - name: Verify retired numerical CLIs reject before creating outputs
        run: |
          set -euo pipefail
          if python tools/run_stage18_full64.py \
            missing-retired-mesh.npz \
            missing-retired-ensemble.json \
            config/stage18_full64_run_authorization_v1.json \
            --mesh-summary missing-retired-summary.json \
            --fields-output stage18-retired-fields.npz \
            --report-output stage18-retired-report.json \
            --progress-output stage18-retired-progress.json \
            --repo-root . \
            >stage18-retired-runner.log 2>&1; then
            echo 'Retired v1 full64 runner unexpectedly succeeded.' >&2
            exit 1
          fi
          grep -F 'The v1 full64 runner is retired after the Ashiya bridge geometry correction; no numerical cases were started.' stage18-retired-runner.log
          test ! -e stage18-retired-fields.npz
          test ! -e stage18-retired-report.json
          test ! -e stage18-retired-progress.json
          rm -f stage18-retired-runner.log
          if python tools/run_stage18_production_mesh_pilot.py \
            missing-retired-mesh.npz \
            missing-retired-ensemble.json \
            config/stage18_production_mesh_pilot_v1.json \
            pilot \
            --output stage18-retired-pilot.json \
            >stage18-retired-pilot.log 2>&1; then
            echo 'Retired v1 pilot runner unexpectedly succeeded.' >&2
            exit 1
          fi
          grep -F 'The v1 production-mesh pilot runner is retired after the Ashiya bridge geometry correction; no numerical cases were started.' stage18-retired-pilot.log
          test ! -e stage18-retired-pilot.json
          rm -f stage18-retired-pilot.log
      - name: Regenerate candidate mesh and reject the retired authorization
        run: |
          python tools/generate_stage16_metric_mesh.py \
            --repo-root . \
            --output stage18-contract-mesh \
            --water-manifest data/onga_unified_water_manifest_r3.json \
            --constraints data/onga_stage16_mesh_constraints_v2.json \
            --probe
          python - <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, 'tools')
          from run_stage18_full64 import validate_authorization, validate_mesh_package, validate_mesh_summary

          authorization = json.loads(Path('config/stage18_full64_run_authorization_v1.json').read_text())
          summary_path = 'stage18-contract-mesh/stage16_metric_mesh_summary.json'
          mesh_path = 'stage18-contract-mesh/onga_stage16_metric_fv_mesh_v2.npz'
          validate_authorization(authorization)

          rejected = {}
          for label, check in (
              ('summary', lambda: validate_mesh_summary(json.loads(Path(summary_path).read_text()), authorization, summary_path)),
              ('package', lambda: validate_mesh_package(mesh_path, authorization)),
          ):
              try:
                  check()
              except RuntimeError as error:
                  rejected[label] = str(error)
          if set(rejected) != {'summary', 'package'}:
              raise RuntimeError('candidate mesh must be rejected by both retired mesh bindings')

          report = {
              'schema': 'onga-stage18-full64-pending-mesh-validation-v1',
              'status': 'passed',
              'full64Executed': False,
              'retiredAuthorizationRejected': True,
              'rejections': rejected,
              'candidateArtifacts': {
                  'summarySha256': hashlib.sha256(Path(summary_path).read_bytes()).hexdigest(),
                  'packageSha256': hashlib.sha256(Path(mesh_path).read_bytes()).hexdigest(),
              },
          }
          Path('stage18-full64-pending-mesh-validation.json').write_text(
              f'{json.dumps(report, indent=2)}\n', encoding='utf-8'
          )
          PY
      - name: Verify validation reports
        run: |
          test -s stage18-full64-workflow-validation.json
          test -s stage18-full64-gate-validation.json
          test -s stage18-full64-pending-mesh-validation.json
      - uses: actions/upload-artifact@v4
        with:
          name: stage18-full64-validation-${{ github.run_id }}
          path: |
            stage18-full64-workflow-validation.json
            stage18-full64-gate-validation.json
            stage18-full64-pending-mesh-validation.json
          if-no-files-found: error
          retention-days: 30
