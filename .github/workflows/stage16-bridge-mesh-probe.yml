name: Stage 20 endpoint mesh one-time Linux reproduction
run-name: Stage 20 endpoint mesh Linux reproduction ${{ github.run_id }}

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: stage20-endpoint-mesh-one-time-linux-reproduction
  cancel-in-progress: false

jobs:
  linux-x86-64-reproduction:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5b
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Consume Stage 20 endpoint mesh Linux reproduction authorization
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import platform
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          def digest(path):
              return hashlib.sha256(Path(path).read_bytes()).hexdigest()

          record = json.loads(Path(
              'config/stage20_endpoint_mesh_linux_reproduction_decision_v1.json'
          ).read_text(encoding='utf-8'))
          decision = record['decision']
          authorization = record['authorization']
          assert record['status'] == 'approved_for_one_linux_reproduction'
          assert decision['approvedChoice'] == 'A'
          assert decision['sourceStatement'] == 'A：この候補を採用し、Linux x86確認へ進める'
          assert decision['oneTime'] is True
          assert decision['geometryOnly'] is True
          assert authorization['status'] == 'approved'
          assert os.environ['GITHUB_EVENT_NAME'] == 'workflow_dispatch'
          assert os.environ['GITHUB_REPOSITORY'] == authorization['expectedRepository']
          assert os.environ['GITHUB_REF'] == authorization['expectedRef']
          assert os.environ['GITHUB_ACTOR'] == authorization['expectedActor']
          assert os.environ['GITHUB_RUN_ATTEMPT'] == '1'
          now = datetime.now(timezone.utc)
          approved = datetime.fromisoformat(authorization['approvedAtUtc'].replace('Z', '+00:00'))
          expires = datetime.fromisoformat(authorization['expiresAtUtc'].replace('Z', '+00:00'))
          assert approved <= now <= expires

          expected = authorization['expectedSha256']
          candidate = record['candidate']
          assert digest(candidate['constraints']) == expected['constraints']
          assert digest(candidate['generator']) == expected['generator']
          assert digest(candidate['baseGenerator']) == expected['baseGenerator']
          assert digest(candidate['artifact']) == expected['candidateArtifact']
          assert digest(candidate['summary']) == expected['candidateSummary']

          repository = urllib.parse.quote(os.environ['GITHUB_REPOSITORY'], safe='/')
          workflow = urllib.parse.quote('stage16-bridge-mesh-probe.yml', safe='')
          branch = urllib.parse.quote(os.environ['GITHUB_REF_NAME'], safe='')
          url = (
              f'https://api.github.com/repos/{repository}/actions/workflows/{workflow}/runs'
              f'?event=workflow_dispatch&branch={branch}&per_page=100'
          )
          request = urllib.request.Request(url, headers={
              'Accept': 'application/vnd.github+json',
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'X-GitHub-Api-Version': '2022-11-28',
          })
          with urllib.request.urlopen(request, timeout=30) as response:
              runs = json.load(response)['workflow_runs']
          current_id = int(os.environ['GITHUB_RUN_ID'])
          for run in runs:
              if int(run['id']) == current_id:
                  continue
              jobs_url = (
                  f"https://api.github.com/repos/{repository}/actions/runs/{int(run['id'])}/jobs"
                  '?filter=all&per_page=100'
              )
              jobs_request = urllib.request.Request(jobs_url, headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'X-GitHub-Api-Version': '2022-11-28',
              })
              with urllib.request.urlopen(jobs_request, timeout=30) as response:
                  jobs = json.load(response)['jobs']
              consumed = any(
                  step.get('name') == 'Consume Stage 20 endpoint mesh Linux reproduction authorization'
                  and step.get('conclusion') == 'success'
                  for job in jobs for step in job.get('steps', [])
              )
              assert not consumed, f"authorization already consumed by run {run['id']}"

          assert platform.system() == 'Linux'
          assert platform.machine() == 'x86_64'
          PY

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/requirements-stage16-metric-mesh.txt

      - name: Install pinned deterministic mesh dependencies
        run: python -m pip install -r tools/requirements-stage16-metric-mesh.txt

      - name: Generate endpoint mesh candidate on Linux x86-64
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-endpoint-mesh-linux-reproduction
        run: >-
          PYTHONPATH=tools python tools/generate_stage20_barrage_endpoint_patch_mesh.py
          --repo-root .
          --constraints data/onga_stage20_mesh_constraints_v2.json
          --output "$WORK_DIR"

      - name: Verify exact Linux reproduction
        env:
          WORK_DIR: ${{ runner.temp }}/stage20-endpoint-mesh-linux-reproduction
        run: >-
          python tools/validate_stage20_endpoint_mesh_linux_reproduction.py
          --generated-directory "$WORK_DIR"
          --expected-artifact docs/results/stage20-barrage-endpoint-mesh-v2-candidate/onga_stage20_metric_fv_mesh_v2_boundary_snap_candidate.npz
          --expected-summary docs/results/stage20-barrage-endpoint-mesh-v2-candidate/stage20_barrage_endpoint_patch_mesh_summary.json
          --output "$WORK_DIR/stage20_endpoint_mesh_linux_reproduction_evidence.json"

      - name: Upload one-time Linux reproduction evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: stage20-endpoint-mesh-linux-reproduction-${{ github.run_id }}
          path: ${{ runner.temp }}/stage20-endpoint-mesh-linux-reproduction
          if-no-files-found: error
          retention-days: 30
